/* ── DATA & CONSTANTS — no JSX, loads instantly ─── */
// ── STORAGE (localStorage only - Railway filesystem is ephemeral) ──────────
async function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error('save failed:',e); }
}
async function load(key, def) {
  try { const r=localStorage.getItem(key); return r?JSON.parse(r):def; } catch(e){ return def; }
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function ai(messages, system, maxTokens=1200) {
  const anthropicKey = localStorage.getItem('anthropic-key') || '';
  const openaiKey = localStorage.getItem('openai-key') || '';
  if (!anthropicKey && !openaiKey) throw new Error('SEM_CHAVE');

  // Prefer OpenAI if Anthropic key has no credits, or if OpenAI key is set
  if (openaiKey) {
    const msgs = system ? [{role:'system',content:system},...messages] : messages;
    const res = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTokens,messages:msgs})
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error.message||'Erro OpenAI');
    return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || 'Resposta vazia.';
  }

  // Fallback to Anthropic
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,system,messages})
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message||'Erro Anthropic');
  return (d.content && d.content.map(b=>b.text||'').join('')) || 'Resposta vazia.';
}

var { useState, useEffect, useRef } = React;

/* ── UTILS + MODALS ─── */

function ScoreBar({label,score,color,T}){
  return (
    <div style={{marginBottom:7}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontSize:12,color:T.muted}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color:color}}>{score}/10</span>
      </div>
      <div style={{background:T.progressBar,borderRadius:99,height:5,overflow:'hidden'}}>
        <div style={{width:`${score*10}%`,height:'100%',background:color,borderRadius:99,transition:'width .6s'}}/>
      </div>
    </div>
  );
}

// ── ANALYSIS RENDER ──────────────────────────────────────────────────────────
function AnalysisBlock({analysis,T}){
  if (!analysis) return null;
  // Strip stray SCORES/Total lines that may exist in old saved ideas
  var cleaned=analysis.replace(/(^|\n)\s*\*?\*?(SCORES|Scores)\*?\*?\s*[-:][^\n]+/gi,'').replace(/(^|\n)\s*\*?\*?Total\*?\*?\s*[-:][^\n]+/gi,'');
  function renderInline(text){
    const parts=[];var lastIdx=0;var regex=/\*\*([^*]+)\*\*/g;var m;var i=0;
    while((m=regex.exec(text))!==null){
      if(m.index>lastIdx) parts.push(text.slice(lastIdx,m.index));
      parts.push(<strong key={i++} style={{color:T.textStrong,fontWeight:700}}>{m[1]}</strong>);
      lastIdx=regex.lastIndex;
    }
    if(lastIdx<text.length) parts.push(text.slice(lastIdx));
    return parts.length?parts:text;
  }
  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {cleaned.split('\n\n').filter(s=>{
        var t=s.trim().replace(/\*/g,'').trim();
        return t.length>2;
      }).map((sec,i)=>{
        const isWarn = /⚠️|risco|problema|INVI[AÁ]VEL/i.test(sec);
        const isGood = /veredicto.*VI[AÁ]VEL|✅\s*VI[AÁ]VEL/i.test(sec);
        const isPositive = /ponto[s]?\s*forte|for[çc]as|oportunidade/i.test(sec);
        var bg=T.inputBg, bd=T.border;
        if(isWarn){bg='rgba(220,38,38,0.08)';bd='rgba(220,38,38,0.25)';}
        else if(isGood){bg='rgba(22,163,74,0.08)';bd='rgba(22,163,74,0.25)';}
        else if(isPositive){bg='rgba(37,99,235,0.08)';bd='rgba(37,99,235,0.3)';}
        // Extract title (if starts with ##) and body separately
        var title=null, body=sec.trim();
        var titleMatch=body.match(/^##\s+([^\n]+)(?:\n([\s\S]*))?$/);
        if(titleMatch){
          title=titleMatch[1].trim().replace(/\*\*/g,'');
          body=(titleMatch[2]||'').trim();
          // Strip duplicate title from start of body
          if(body&&title){
            var tEsc=title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            body=body.replace(new RegExp('^(?:\\*\\*)?\\s*'+tEsc+'\\s*(?:\\*\\*)?\\s*(?:\\n+|$)','i'),'').trim();
          }
        }
        return (
          <div key={i} style={{background:bg,border:`1px solid ${bd}`,borderRadius:9,padding:'10px 14px',fontSize:13,color:T.text,lineHeight:1.75}}>
            {title&&<div style={{color:T.accent,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:body?6:0}}>{renderInline(title)}</div>}
            {body&&<div style={{fontWeight:400}}>{renderInline(body)}</div>}
          </div>
        );
      })}
    </div>
  );
}

.\n\nANCORAS PARA MERCADO (tamanho do mercado endereçavel):\n- 9-10: Mercado massivo e crescente (milhoes de clientes, R$10bi+/ano - ex: alimentacao, pets, saude, educacao)\n- 7-8: Mercado grande (centenas de milhares, R$1bi+ - ex: apps SaaS populares, autonomos, nichos B2C)\n- 5-6: Mercado medio (dezenas de milhares - ex: nichos B2B especificos, servicos especializados)\n- 3-4: Mercado pequeno (nicho regional ou hiper-especializado)\n- 1-2: Mercado minusculo ou inexistente\n\nANCORAS PARA EXECUCAO (facilidade de construir e lancar):\n- 9-10: MVP em dias, tecnologia simples, baixo custo inicial (servicos locais, landing page + WhatsApp)\n- 7-8: MVP em semanas, tecnologia comum, custo moderado (apps no-code, SaaS basico)\n- 5-6: Requer desenvolvimento complexo, regulacao ou investimento medio\n- 3-4: Complexo tecnicamente, requer licencas ou alto investimento\n- 1-2: Extremamente dificil (hardware, regulacao pesada, alto capital)\n\nANCORAS PARA INOVACAO (diferenciacao real):\n- 9-10: Solucao pioneira, cria nova categoria\n- 7-8: Diferencial claro vs concorrencia estabelecida\n- 5-6: Melhoria incremental de solucoes existentes\n- 3-4: Commodity com pouco diferencial\n- 1-2: Copia sem valor agregado\n\nANCORAS PARA RECEITA (potencial de faturamento em 24 meses):\n- 9-10: R$ 500k+ MRR possivel (produto massivo, ticket alto+volume)\n- 7-8: R$ 50k-500k MRR (bom produto, publico claro)\n- 5-6: R$ 10k-50k MRR (negocio local ou nicho)\n- 3-4: Abaixo de R$ 10k MRR (negocio pequeno)\n- 1-2: Dificil monetizar\n\nANCORAS PARA BAIXO RISCO (quanto MAIOR o score, MENOR o risco):\n- 9-10: Demanda comprovada, baixo investimento, reversibilidade facil\n- 7-8: Alguns riscos gerenciaveis\n- 5-6: Riscos medios (concorrencia forte, dependencia de plataformas)\n- 3-4: Altos riscos (regulatorio, tecnologico, de mercado)\n- 1-2: Risco existencial (pode morrer facilmente)\n\nPROIBIDO:\n- Dar todas as notas iguais (tipo 5,5,5,5,5 ou 4,4,4,4,4)\n- Ser conservador demais sem justificativa\n- Subestimar mercados em crescimento comprovado\n- Dar score baixo em mercado para nichos como pets, saude, educacao, delivery, SaaS, etc\n\nOBRIGATORIO:\n- Use a escala inteira: notas entre 1 e 10\n- Diferencie os scores (ideias boas tem mix tipo 8,6,7,8,6)\n- Ideias excelentes podem chegar a 40-45 de total\n- Ideias ruins ficam em 10-20 de total\n- Ideias medianas ficam em 25-35 de total\n\nFinal retorne (numeros entre 1 e 10, SEJA ESPECIFICO E USE A ESCALA):\nSCORES:mercado=X,execucao=X,inovacao=X,receita=X,risco=X`}],

      +'@media print{body{max-width:none;padding:0;background:white;color:black}.btn-group{display:none}.doc-body{max-height:none!important;padding:8px 22px 22px 22px!important;border-top:1px solid #2d2a4a!important}.doc-item,.section,.chart-card,.verdict-banner,.kpi,.infocard,.analysis-box{break-inside:avoid;page-break-inside:avoid}.hero{page-break-after:avoid}.doc-arrow{display:none}}';

    // Hero
    var heroHtml='<header class="hero">'

      +'<span>'+esc(form.category)+'</span>'

      +'<div class="verdict-badge">'+verdictEmoji+' '+verdict+'</div>'
      +'</header>';

    // KPIs
    var kpisHtml='<section class="section"><div class="section-title">Indicadores Principais</div><div class="kpis">'
      +'<div class="kpi"><div class="kpi-label">Score Total</div><div class="kpi-value">'+totalScore+'<span style="font-size:16px;color:#64748b">/50</span></div><div class="kpi-sub">'+avgScore+' de media</div></div>'
      +'<div class="kpi"><div class="kpi-label">Veredicto</div><div class="kpi-value-sm" style="color:'+verdictColor+'">'+verdictEmoji+' '+verdict+'</div></div>'
      +'<div class="kpi"><div class="kpi-label">Melhor Score</div><div class="kpi-value">'+Math.max.apply(null,scoreKeys.map(function(k){return sc[k]||0;}))+'</div><div class="kpi-sub">de 10</div></div>'
      +'<div class="kpi"><div class="kpi-label">Pior Score</div><div class="kpi-value">'+Math.min.apply(null,scoreKeys.map(function(k){return sc[k]||0;}))+'</div><div class="kpi-sub">de 10</div></div>'
      +'</div></section>';

    // Charts
    var chartsHtml='<section class="section"><div class="section-title">Analise Visual</div><div class="charts">'

      +'<div class="chart-card"><h3>📊 Comparativo de Scores</h3><div class="chart-canvas"><canvas id="barChart"></canvas></div></div>'
      +'</div></section>';

    var coreHtml='<section class="section"><div class="section-title">Informacoes do Negocio</div>'

      +(form.desc?'<div class="infocard"><h3>Descricao</h3><p>'+esc(form.desc)+'</p></div>':'')

      +(form.problem?'<div class="infocard"><h3>Problema que resolve</h3><p>'+esc(form.problem)+'</p></div>':'')
      +(form.model?'<div class="infocard"><h3>Modelo de receita</h3><p>'+esc(form.model)+'</p></div>':'')
      +'</div></section>';

    // Q&A from founder
    var qaHtml='';
    if(questions.length>0){
      var qaParts=[];
      questions.forEach(function(q,i){if(answers[i]){qaParts.push('<div class="analysis-box"><h3>'+esc(q)+'</h3><p>'+esc(answers[i])+'</p></div>');}});
      if(qaParts.length>0) qaHtml='<section class="section"><div class="section-title">Respostas do Fundador</div>'+qaParts.join('')+'</section>';
    }

    // Analysis (broken into cards per ## section)
    var analysisHtml='';
    if(cleanAnalysis){
      // Normalize: collapse blank lines after ## title so body stays with title
      var normalized=cleanAnalysis.replace(/(^|\n)##\s+([^\n]+)\n\n+/g,'$1## $2\n');
      // Remove stray SCORES/Scores/Total lines that sometimes leak from LLM
      normalized=normalized.replace(/(^|\n)\s*(SCORES|Scores)\s*[-:][^\n]+/gi,'');
      normalized=normalized.replace(/(^|\n)\s*Total\s*[-:][^\n]+/gi,'');
      // Split into sections by ## headers
      var parts=normalized.split(/(?=^##\s+)/gm).filter(function(s){return s.trim();});
      var aboxes='';
      parts.forEach(function(sec){
        var cleanSec=sec.trim();
        // Skip sections with no meaningful content (just ** or empty)
        var stripped=cleanSec.replace(/[*#\s]/g,'');
        if(stripped.length<3) return;
        var titleMatch=cleanSec.match(/^##\s+(.+?)(?:\n|$)/);
        if(titleMatch){
          var title=titleMatch[1].trim().replace(/\*\*/g,'').replace(/^#+\s*/,'');
          var body=cleanSec.replace(/^##\s+.+?(?:\n|$)/,'').trim();
          // Strip duplicate title from start of body (AI often repeats it)
          var titleEscaped=title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          body=body.replace(new RegExp('^(?:\\*\\*)?\\s*'+titleEscaped+'\\s*(?:\\*\\*)?\\s*(?:\\n+|$)','i'),'');
          body=body.trim();
          // Skip if body is empty or just markdown artifacts
          var bodyStripped=body.replace(/[*#\s]/g,'');
          if(bodyStripped.length<3) return;
          var bodyHtml=esc(body).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');
          aboxes+='<div class="analysis-box"><h3>'+esc(title)+'</h3><p>'+bodyHtml+'</p></div>';
        }else{
          var plainHtml=esc(cleanSec).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');
          aboxes+='<div class="analysis-box"><p>'+plainHtml+'</p></div>';
        }
      });
      if(aboxes) analysisHtml='<section class="section"><div class="section-title">Analise Estrategica</div>'+aboxes+'</section>';
    }

    // 8 docs as accordion
    var docsHtml='';
    if(docs && docs.length>0){
      var accordionItems='';
      docs.forEach(function(d,i){
        var num=String(i+1).padStart(2,'0');

        accordionItems+='<div class="doc-item'+(i===0?' open':'')+'" onclick="this.classList.toggle(\'open\')">'
          +'<div class="doc-header">'
          +'<div><span class="doc-num">'+num+'</span><span class="doc-title">'+esc(cleanName)+'</span></div>'
          +'<span class="doc-arrow">▼</span>'
          +'</div>'
          +'<div class="doc-body">'+mdToHtml(d.content)+'</div>'
          +'</div>';

      docsHtml='<section class="section"><div class="section-title">Documentacao Completa</div>'+accordionItems+'</section>';
    }

    // Verdict banner
    var verdictBannerHtml='<section class="section"><div class="verdict-banner">'

      +'<div class="vb-sub">Score: '+totalScore+'/50 · Media: '+avgScore+'/10</div>'
      +'</div></section>';

    // Chart.js init script
    var chartScript=''
      +'var radarCtx=document.getElementById("radarChart").getContext("2d");'
      +'new Chart(radarCtx,{type:"radar",data:{labels:['+radarLabels+'],datasets:[{label:"Score",data:['+radarData+'],backgroundColor:"rgba(124,58,237,0.25)",borderColor:"#a78bfa",borderWidth:2,pointBackgroundColor:"#a78bfa",pointBorderColor:"#fff",pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:10,ticks:{stepSize:2,color:"#64748b",backdropColor:"transparent",font:{size:10}},grid:{color:"rgba(71,85,105,0.3)"},angleLines:{color:"rgba(71,85,105,0.3)"},pointLabels:{color:"#cbd5e1",font:{size:12,weight:"600"}}}}}});'
      +'var barCtx=document.getElementById("barChart").getContext("2d");'
      +'new Chart(barCtx,{type:"bar",data:{labels:['+radarLabels+'],datasets:[{label:"Score (0-10)",data:['+radarData+'],backgroundColor:["#10b981","#3b82f6","#8b5cf6","#f59e0b","#06b6d4"],borderRadius:8,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:10,ticks:{stepSize:2,color:"#64748b"},grid:{color:"rgba(71,85,105,0.2)"}},x:{ticks:{color:"#cbd5e1",font:{size:11,weight:"600"}},grid:{display:false}}}}});';

    var html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>'
      +'<title>'+esc(form.name)+' — Relatorio idevIA</title>'
      +'<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"><\/script>'
      +'<style>'+css+'</style>'
      +'</head><body>'
      +'<div id="report">'
      +heroHtml
      +kpisHtml
      +chartsHtml
      +coreHtml
      +qaHtml
      +analysisHtml
      +docsHtml
      +verdictBannerHtml
      +'<div class="footer">Relatorio gerado pelo <strong>idevIA</strong> em '+new Date().toLocaleDateString('pt-BR')+' · Sistema de gestao estrategica para fundadores</div>'
      +'</div>'
      +'<div class="btn-group">'
      +'<button class="pdf-btn pdf-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>'
      +'</div>'
      +'<script>window.addEventListener("load",function(){'+chartScript+'});<\/script>'
      +'</body></html>';
    var blob=new Blob([html],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='idevia_'+form.name.replace(/\s+/g,'_')+'.html';a.click();URL.revokeObjectURL(url);
  }

  function confirmCreate(){
    const docs=allDocsRef.current.length>0?allDocsRef.current:allDocs;
    var qaData=null;
    if(questions.length>0){
      var qaPairs=[];
      questions.forEach(function(q,i){if(answers[i])qaPairs.push({q:q,a:answers[i]});});
      if(qaPairs.length>0) qaData=qaPairs;
    }
    const idea={
      id:'idea_'+Date.now(),...form,status:'em análise',analysis:analysis||'',scores:scores||{},docs:docs,

      folders:[
        {id:'r',name:`💡 ${form.name}`,type:'root',parentId:null},

        {id:'f6',name:'💰 06. Financeiro',type:'folder',parentId:'r'},

              </div>

              ))}
              <div style={{display:'flex',gap:9,marginTop:16}}>
                <button onClick={()=>{setStep('form');}} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:10,padding:'11px 16px',fontSize:13,cursor:'pointer'}}>← Voltar</button>
                <button onClick={()=>{analyzeIdea();}} style={{flex:1,background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:10,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer'}}>🤖 Analisar com respostas</button>
                <button onClick={()=>{setAnswers({});analyzeIdea();}} style={{background:'none',color:T.hint,border:`1px solid ${T.border}`,borderRadius:10,padding:'11px 14px',fontSize:12,cursor:'pointer'}}>Pular →</button>
              </div>
            </div>
          )}

          {step==='analyzing'&&(
            <div style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:44,marginBottom:14}}>🤖</div>
              <div style={{fontSize:15,fontWeight:700,color:T.textStrong,marginBottom:8}}>Analisando sua ideia...</div>
              <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap'}}>
                {['Mercado','Concorrência','Viabilidade','Riscos','Receita'].map((l,i)=>(
                  <div key={l} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:T.accentBg,color:T.accent,animation:`pulse 1.5s ${i*0.25}s infinite`}}>{l}</div>
                ))}
              </div>
            </div>
          )}

          {step==='result'&&(
            <div>
              {scores&&(
                <div style={{background:T.cardSm,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px',marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.textStrong,marginBottom:10}}>📊 Scores</div>
                  <ScoreBar label="Mercado" score={scores.mercado} color="#16a34a" T={T}/>
                  <ScoreBar label="Execução" score={scores.execucao} color="#2563eb" T={T}/>
                  <ScoreBar label="Inovação" score={scores.inovacao} color="#7c3aed" T={T}/>
                  <ScoreBar label="Receita" score={scores.receita} color="#d97706" T={T}/>
                  <ScoreBar label="Baixo risco" score={scores.risco} color="#16a34a" T={T}/>
                  {(scores.mercado+scores.execucao+scores.inovacao+scores.receita+scores.risco)<25&&<div style={{marginTop:10,background:'rgba(220,38,38,0.12)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:9,padding:'10px 13px',fontSize:12,color:'#f87171',fontWeight:600}}>{'\u26A0\uFE0F Score total abaixo de 25/50 \u2014 esta ideia apresenta serios problemas de viabilidade'}</div>}
                </div>
              )}
              <AnalysisBlock analysis={analysis} T={T}/>
              <div style={{display:'flex',gap:9,marginTop:18,flexWrap:'wrap'}}>
                <button onClick={generateDocs} style={{flex:1,minWidth:150,background:'#16a34a',color:'white',border:'none',borderRadius:10,padding:'11px',fontSize:13,fontWeight:700,cursor:'pointer'}}>✅ Avançar — Gerar documentação</button>
                <button onClick={onClose} style={{flex:1,minWidth:100,background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:10,padding:'11px',fontSize:13,cursor:'pointer'}}>✕ Descartar</button>
              </div>
            </div>
          )}

          {step==='docs'&&(
            <div>
              <div style={{fontSize:13,color:T.muted,marginBottom:14}}>Gerando documentação completa...</div>
              <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:18}}>
                {['01. Sumário Executivo','02. Análise de Mercado','03. Modelo de Negócio','04. Plano de Validação MVP','05. Roadmap 90 dias','06. Análise Financeira','07. Riscos e Mitigações','08. Plano Pós-lançamento'].map((name,i)=>{
                  const p=docProgress[i]; const s=p?p.status:'aguardando';
                  return (
                    <div key={name} style={{display:'flex',gap:10,alignItems:'center',padding:'9px 13px',background:T.cardSm,border:`1px solid ${s==='pronto'?'rgba(22,163,74,0.3)':T.border}`,borderRadius:9}}>
                      <span style={{fontSize:15,flexShrink:0}}>{s==='pronto'?'✅':s==='gerando'?'⏳':s==='erro'?'❌':'⏸️'}</span>
                      <span style={{fontSize:12,color:s==='pronto'?'#4ade80':s==='gerando'?T.accent:T.muted,flex:1}}>{name}</span>
                      {s==='gerando'&&<div style={{width:12,height:12,border:`2px solid ${T.accent}`,borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>}
                    </div>
                  );
                })}
              </div>
              {allDocs.length===8&&(
                <>
                  <div style={{background:'rgba(22,163,74,0.1)',border:'1px solid rgba(22,163,74,0.3)',borderRadius:12,padding:'14px',marginBottom:14,textAlign:'center'}}>
                    <div style={{fontSize:15,fontWeight:700,color:'#4ade80',marginBottom:4}}>🎉 Documentação completa!</div>
                    <div style={{fontSize:12,color:T.muted}}>8 documentos + estrutura de pastas criados.</div>
                  </div>
                  <div style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:11,color:T.hint}}>
                    <div style={{marginBottom:6}}><strong style={{color:'#4ade80'}}>💾 Salvar em Minhas Ideias</strong> — guarda a ideia dentro do app para acessar depois</div>
                    <div><strong style={{color:'#60a5fa'}}>📥 Baixar Relatório</strong> — gera um arquivo HTML (com opção de PDF) para compartilhar ou arquivar</div>
                  </div>
                  <div style={{fontSize:10,color:T.muted,marginBottom:10,textAlign:'center',fontStyle:'italic'}}>Você pode fazer os dois, só um, ou nenhum</div>
                  <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
                    <button onClick={()=>{confirmCreate();}} style={{flex:1,minWidth:150,background:'#16a34a',color:'white',border:'none',borderRadius:10,padding:'12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>💾 Salvar em Minhas Ideias</button>
                    <button onClick={downloadReport} style={{background:'#2563eb',color:'white',border:'none',borderRadius:10,padding:'12px 16px',fontSize:13,fontWeight:700,cursor:'pointer'}}>📥 Baixar Relatório</button>
                    <button onClick={onClose} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:10,padding:'12px 16px',fontSize:13,cursor:'pointer'}}>Cancelar</button>
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── GENERATE IDEA MODAL ───────────────────────────────────────────────────────
function GenerateModal({T,onClose,onSelect,onSaveDraft}){
  const [niche,setNiche]=useState('');
  const [loading,setLoading]=useState(false);
  const [ideas,setIdeas]=useState([]);
  const inp={background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:8,padding:'10px 12px',color:T.text,fontSize:14,width:'100%',outline:'none'};

  async function generate(){
    if(!niche.trim()) return;
    setLoading(true); setIdeas([]);
    try{
      const r=await ai([{role:'user',content:`Avalie o nicho: "${niche}".\n\n=== PRIORIDADE MAXIMA - VERIFICACAO DE SEGURANCA ===\nANTES de qualquer coisa, verifique se o nicho envolve atividades ILEGAIS GRAVES. Se envolver, REJEITE IMEDIATAMENTE com tom SERIO e FIRME, SEM SARCASMO ALGUM.\n\nCasos de rejeicao GRAVE (tom serio, nao brincar):\n- QUALQUER conteudo envolvendo menores de idade em contexto sexual, fotografico comercial, ou exploratorio (ex: "fotos de criancas", "fotos de menininhas", "meninas novinhas", qualquer ambiguidade nesse sentido)\n- Pornografia infantil ou exploracao sexual de menores\n- Trafico de pessoas, orgaos, drogas ilicitas (cocaina, crack, heroina, metanfetamina)\n- Trafico de armas, explosivos\n- Golpes, estelionato, piramides financeiras\n- Lavagem de dinheiro\n- Servicos para crimes (ex: fuga, intimidacao)\n- Pratica medica ilegal sem habilitacao\n\nSe detectar QUALQUER UM desses casos, retorne este JSON com tom serio e o tipo de crime:\n[{"nome":"ATIVIDADE ILEGAL","categoria":"ALERTA","crimeType":"[um de: menores, trafico_drogas, trafico_pessoas, trafico_armas, golpes_financeiros, violencia_mulher, crime_animal, outros]","descricao":"⚠️ AVISO: Este tema envolve atividade potencialmente criminosa. [Explicacao clara do que e ilegal e por que]. Nao e possivel gerar ideias de negocio para atividades ilegais.","publicoAlvo":"-","modeloReceita":"-","problemaResolve":"-","potencial":"Baixo","dificuldade":"Alta"}]\n\n=== FIM DA VERIFICACAO DE SEGURANCA ===\n\nSe passou pela verificacao de seguranca, GERE 3 ideias de negocio REALISTAS e VIAVEIS.\n\nTAREFA PRINCIPAL: gerar ideias uteis. Aceite qualquer mercado LEGAL, incluindo:\n- Servicos locais (lava-jato, barbearia, salao, pet shop, lanchonete, food truck)\n- Comercio legal (venda de peixe, alimentos, produtos regionais, turismo)\n- SaaS e apps B2B/B2C para qualquer setor\n- Consultoria, educacao, saude, financas\n- Cannabis MEDICINAL (legal no Brasil com receita)\n- Turismo em destinos reais\n\nMercados saturados NAO sao motivo para rejeitar. Use potencial Medio/Baixo.\n\nCASOS BORDERLINE — ACEITE com ressalvas no campo descricao, NAO rejeite:\n- Cannabis medicinal (legal no Brasil com receita e ANVISA) — aceite, mencione regulamentacao\n- Dark web / Tor — aceite para usos legitimos (jornalismo, privacidade, seguranca, anonimato de ativistas)\n- Antartida / regioes remotas — aceite turismo cientifico e logistica legal\n- CBD, oleo de canhamo — legal com receita no Brasil\n- Bebidas alcoolicas, tabaco, apostas esportivas regulamentadas — legais com alvara\n- Importacao/exportacao — legal com RECEITA/documentacao\n- Conteudo adulto legal (adultos consentindo) — legal mas com restricoes\n- Pesca esportiva, caca regulamentada — legal com licenca\n\nCorrija erros de digitacao obvios.\n\nREJEITE como INVIAVEL (tom leve, nao serio) apenas se:\n1. Fisicamente impossivel: "terreno em Marte", "vender o sol"\n2. Sem mercado possivel: "escola de natacao para peixes", "circo de pulgas"\n3. Metafora idiomatica exata: "vender gelo no deserto", "geladeira para esquimo"\n\nQuando nao conhecer cidade ou mercado, NAO REJEITE. Gere ideias assumindo que existe.\n\nSe cair em INVIAVEL (nao ILEGAL), retorne:\n[{"nome":"NICHO INVIAVEL","categoria":"-","descricao":"[Motivo objetivo]. Sugestoes reais: [2-3 alternativas]","publicoAlvo":"-","modeloReceita":"-","problemaResolve":"-","potencial":"Baixo","dificuldade":"Alta"}]\n\nCASO PADRAO (maioria) - retorne 3 ideias REAIS:\n- Potencial Alto: mercado grande, demanda clara\n- Potencial Medio: mercado existe, competitivo\n- Potencial Baixo: nicho pequeno ou saturado\n\nRetorne APENAS JSON:\n[{"nome":"...","categoria":"...","descricao":"...","publicoAlvo":"...","modeloReceita":"...","problemaResolve":"...","potencial":"Alto/Medio/Baixo","dificuldade":"Alta/Media/Baixa"}]`}],'Especialista em modelos de negocio com filtro de seguranca. Rejeite com firmeza e seriedade atividades ilegais (especialmente envolvendo menores). Apenas JSON valido, sem markdown.',1200);
      setIdeas(JSON.parse(r.replace(/```json|```/g,'').trim()));
    }catch(e){
      if(e.message==='SEM_CHAVE'){
        setIdeas([{nome:'Chave API não configurada',descricao:'Vá em Configurações → Integrações e cole sua chave Anthropic. Obtida em console.anthropic.com — gratuito.',potencial:'—',dificuldade:'—',_noKey:true}]);
      } else {
        setIdeas([{nome:'Erro de conexão',descricao:'Verifique sua chave API em Configurações → Integrações. Detalhe: '+e.message,potencial:'—',dificuldade:'—'}]);
      }
    }
    setLoading(false);
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:16,overflowY:'auto'}}>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,width:'100%',maxWidth:580,margin:'auto'}} className="fade-in">
        <div style={{padding:'18px 22px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:16,fontWeight:700,color:T.textStrong}}>✨ Gerar Ideias por Nicho</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.muted,fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'18px 22px'}}>
          <div style={{display:'flex',gap:9,marginBottom:18}}>
            <input value={niche} onChange={e=>setNiche(e.target.value)} onKeyDown={e=>e.key==='Enter'&&generate()} placeholder="Ex: saúde mental, educação infantil, logística..." style={{...inp,flex:1}}/>
            <button onClick={generate} disabled={loading||!niche.trim()} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer',opacity:loading||!niche.trim()?0.5:1,whiteSpace:'nowrap'}}>
              {loading?'⏳':'✨ Gerar'}
            </button>
          </div>
          {loading&&<div style={{textAlign:'center',padding:'30px',color:T.muted,fontSize:14}}><div style={{fontSize:32,marginBottom:8}}>🤖</div>Explorando "{niche}"...</div>}
          {ideas.map((idea,i)=>{
            if(idea.nome==='ATIVIDADE ILEGAL'){
              var reportChannels={
                menores:{label:'Crime contra crianças e adolescentes',number:'Disque 100 (Disque Direitos Humanos) · disque100.mdh.gov.br',color:'#fca5a5'},
                trafico_drogas:{label:'Tráfico de drogas',number:'Polícia Federal: 197 · Disque Denúncia: 181',color:'#fca5a5'},
                trafico_pessoas:{label:'Tráfico de pessoas',number:'Disque 100 · Polícia Federal: 197',color:'#fca5a5'},
                trafico_armas:{label:'Tráfico de armas/explosivos',number:'Polícia Federal: 197 · Exército: 136',color:'#fca5a5'},
                golpes_financeiros:{label:'Golpes e estelionato',number:'Polícia Civil: 181 · Procon · consumidor.gov.br',color:'#fca5a5'},
                violencia_mulher:{label:'Violência contra mulher',number:'Ligue 180 · Disque Denúncia: 181',color:'#fca5a5'},
                crime_animal:{label:'Crime ambiental ou contra animais',number:'Polícia Ambiental · Linha Verde IBAMA: 0800 618080',color:'#fca5a5'},
                outros:{label:'Outros crimes',number:'Disque Denúncia: 181 · Polícia Civil local',color:'#fca5a5'}
              };
              var crime=reportChannels[idea.crimeType]||reportChannels.outros;
              return(
                <div key={i} style={{background:'rgba(220,38,38,0.2)',border:'2px solid #dc2626',borderRadius:12,padding:'20px 22px',marginBottom:10}}>
                  <div style={{fontSize:16,fontWeight:800,color:'#fca5a5',marginBottom:10,letterSpacing:'.02em'}}>{'🚫 ATIVIDADE ILEGAL DETECTADA'}</div>
                  <div style={{fontSize:13,color:'#fecaca',lineHeight:1.75,whiteSpace:'pre-wrap',marginBottom:12}}>{idea.descricao}</div>
                  <div style={{fontSize:11,color:crime.color,background:'rgba(0,0,0,0.3)',borderRadius:7,padding:'10px 12px',marginBottom:12,fontWeight:600}}>
                    <div style={{marginBottom:3,opacity:0.85}}>📞 {crime.label} — denúncia:</div>
                    <div style={{fontSize:12,fontWeight:700}}>{crime.number}</div>
                  </div>
                  <button onClick={onClose} style={{background:'#dc2626',color:'white',border:'none',borderRadius:7,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Fechar</button>
                </div>
              );
            }
            if(idea.nome==='NICHO INVIAVEL'){
              return(
                <div key={i} style={{background:'rgba(220,38,38,0.1)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:12,padding:'16px 18px',marginBottom:10}}>
                  <div style={{fontSize:14,fontWeight:700,color:'#f87171',marginBottom:8}}>{'\u274C Nicho inviavel'}</div>
                  <div style={{fontSize:12,color:T.text,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{idea.descricao}</div>
                  <button onClick={onClose} style={{marginTop:10,background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:'6px 14px',fontSize:12,cursor:'pointer'}}>Tentar outro nicho</button>
                </div>
              );
            }
            return(
            <div key={i} style={{background:T.cardSm,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7,flexWrap:'wrap',gap:7}}>
                <div style={{fontWeight:700,fontSize:14,color:T.textStrong}}>{idea.nome}</div>
                <div style={{display:'flex',gap:5}}>
                  <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:idea.potencial==='Baixo'?'rgba(220,38,38,0.15)':'rgba(22,163,74,0.15)',color:idea.potencial==='Baixo'?'#f87171':'#4ade80',border:idea.potencial==='Baixo'?'1px solid rgba(220,38,38,0.3)':'1px solid rgba(22,163,74,0.3)'}}>Potencial {idea.potencial}</span>
                  <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(37,99,235,0.15)',color:'#93c5fd',border:'1px solid rgba(37,99,235,0.3)'}}>{idea.dificuldade}</span>
                </div>
              </div>
              <div style={{fontSize:12,color:T.muted,lineHeight:1.6,marginBottom:9}}>{idea.descricao}</div>
              {idea.potencial==='Baixo'&&<div style={{fontSize:11,color:'#f87171',background:'rgba(220,38,38,0.1)',border:'1px solid rgba(220,38,38,0.25)',borderRadius:7,padding:'6px 10px',marginBottom:9}}>{'\u26A0\uFE0F Potencial baixo \u2014 considere se vale o investimento'}</div>}
              <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
                <button onClick={()=>{onSelect(idea);onClose();}} style={{background:T.accentBg,color:T.accent,border:`1px solid ${T.accent}44`,borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Usar esta →</button>
                <button onClick={()=>{onSaveDraft(idea);}} title="Salvar como rascunho" style={{background:'transparent',color:T.hint,border:`1px solid ${T.border}`,borderRadius:7,padding:'5px 9px',fontSize:14,cursor:'pointer'}}>💾</button>
              </div>
            </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── IDEAS PAGE ────────────────────────────────────────────────────────────────
</script>

<script type="text/babel">
/* ── IDEAS PAGE ─── */
function EditIdeaModal({T,idea,onClose,onSave}){

    name:idea.name||'',
    category:idea.category||'SaaS / Software',
    desc:idea.desc||'',
    target:idea.target||'',

    model:idea.model||'',
    city:idea.city||'',

  });

          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Nome da ideia</label>
          <input value={form.name} onChange={e=>update('name',e.target.value)} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none'}}/>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Categoria</label>
          <select value={form.category} onChange={e=>update('category',e.target.value)} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none',cursor:'pointer'}}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Cidade / Região (opcional)</label>
          <input value={form.city} onChange={e=>update('city',e.target.value)} placeholder="Ex: São José do Rio Preto - SP" style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none'}}/>

          <textarea value={form.desc} onChange={e=>update('desc',e.target.value)} rows={3} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none',resize:'vertical',fontFamily:'inherit'}}/>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Público-alvo</label>
          <input value={form.target} onChange={e=>update('target',e.target.value)} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none'}}/>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Problema que resolve</label>
          <textarea value={form.problem} onChange={e=>update('problem',e.target.value)} rows={2} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none',resize:'vertical',fontFamily:'inherit'}}/>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Modelo de receita</label>
          <input value={form.model} onChange={e=>update('model',e.target.value)} style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:5,marginBottom:12,outline:'none'}}/>
          <label style={{fontSize:11,color:T.hint,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginTop:8,paddingTop:12,borderTop:`1px solid ${T.border}`}}>📝 Minhas anotações (pessoal, fora da análise da IA)</label>
          <textarea value={form.notes} onChange={e=>update('notes',e.target.value)} rows={5} placeholder="Insights, próximos passos, aprendizados, contatos úteis, reflexões sobre a ideia..." style={{width:'100%',background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 12px',fontSize:13,color:T.text,marginTop:8,marginBottom:12,outline:'none',resize:'vertical',fontFamily:'inherit'}}/>
        </div>
        <div style={{padding:'14px 20px',borderTop:`1px solid ${T.border}`,display:'flex',gap:9,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:9,padding:'9px 16px',fontSize:13,cursor:'pointer'}}>Cancelar</button>
          <button onClick={()=>onSave(form)} style={{background:'#16a34a',color:'white',border:'none',borderRadius:9,padding:'9px 20px',fontSize:13,fontWeight:700,cursor:'pointer'}}>💾 Salvar</button>
        </div>
      </div>
    </div>
  );
}

function IdeasPage({T}){
  const [ideas,setIdeas]=useState([]);
  const [showCreate,setShowCreate]=useState(false);
  const [showGen,setShowGen]=useState(false);
  const [prefill,setPrefill]=useState(null);
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [reanalyzing,setReanalyzing]=useState(false);
  const [filter,setFilter]=useState('todas');
  const [search,setSearch]=useState('');
  const [seeded,setSeeded]=useState(false);
  const [activeId,setActiveId]=useState(()=>localStorage.getItem('active_idea_id')||null);
  const [switchPrompt,setSwitchPrompt]=useState(null);
  const [compareMode,setCompareMode]=useState(false);
  const [compareIds,setCompareIds]=useState([]);

  async function reanalyzeIdea(){
    if(!selected||reanalyzing) return;
    setReanalyzing(true);
    try{
      var cityLine=selected.city?'\nLOCALIZACAO: '+selected.city:'';
      var cityRule=selected.city?'\n- Analise considerando o mercado local de '+selected.city+', populacao, renda e concorrencia.':'';
      var resp=await ai([{role:'user',content:'Analise esta ideia de forma CRITICA e REALISTA.\n\nIDEIA: '+selected.name+'\nCATEGORIA: '+selected.category+'\nDESCRICAO: '+selected.desc+'\nPUBLICO: '+(selected.target||'-')+'\nPROBLEMA: '+(selected.problem||'-')+'\nMODELO: '+(selected.model||'-')+cityLine+'\n\nREGRAS:\n- Direto e util (~300 palavras).'+cityRule+'\n\n## Resumo executivo\n## Pontos fortes reais\n## Riscos e problemas serios\n## Concorrencia e diferenciacao\n## Potencial de receita realista\n## Proximo passo mais importante\n## Veredicto (VIAVEL / VIAVEL COM RESSALVAS / INVIAVEL)\n\nUse escala 1-10. Varie os scores. NAO de 5 pra tudo.\nSCORES:mercado=X,execucao=X,inovacao=X,receita=X,risco=X'}],'Consultor senior. Critico e util.',2500);
      var sm=resp.match(/SCORES:([^\n]+)/);
      var ps={mercado:6,execucao:6,inovacao:6,receita:6,risco:6};
      if(sm) sm[1].split(',').forEach(function(p){var kv=p.split('=');if(kv[0]&&kv[1]){var ck=kv[0].trim().replace(/\*/g,'').replace(/[áâã]/gi,'a').replace(/[éê]/gi,'e').replace(/[í]/gi,'i').replace(/[óôõ]/gi,'o').replace(/[ú]/gi,'u').replace(/[ç]/gi,'c').toLowerCase();if(['mercado','execucao','inovacao','receita','risco'].indexOf(ck)>=0)ps[ck]=parseInt(kv[1])||6;}});
      var cleanResp=resp.replace(/SCORES:[^\n]+/,'').replace(/(^|\n)\s*\*?\*?(SCORES|Scores)\*?\*?\s*[-:][^\n]+/gi,'').replace(/(^|\n)\s*\*?\*?Total\*?\*?\s*[-:][^\n]+/gi,'').trim();
      var updated=ideas.map(function(i){return i.id===selected.id?Object.assign({},i,{analysis:cleanResp,scores:ps,reanalyzedAt:new Date().toISOString()}):i;});
      setIdeas(updated);await save('ideas_v2',updated);
      setSelected(Object.assign({},selected,{analysis:cleanResp,scores:ps,reanalyzedAt:new Date().toISOString()}));
    }catch(e){alert('Erro na re-análise: '+e.message);}
    setReanalyzing(false);
  }

  useEffect(()=>{
    load('ideas_v2',null).then(d=>{
      if(!d){
        setIdeas(SEED_IDEAS);
        save('ideas_v2',SEED_IDEAS);
        setSeeded(true);
      } else { setIdeas(d); }
    });
  },[]);

  async function addIdea(idea){const u=[idea,...ideas];setIdeas(u);await save('ideas_v2',u);}
  async function updateIdea(id,patch){const u=ideas.map(i=>i.id===id?{...i,...patch}:i);setIdeas(u);await save('ideas_v2',u);}
  async function duplicateIdea(idea){
    var dup={...idea,id:'idea_'+Date.now(),name:idea.name+' (cópia)',status:'rascunho',createdAt:new Date().toISOString(),guideProgress:{}};
    const u=[dup,...ideas];setIdeas(u);await save('ideas_v2',u);
  }
  async function trackDownload(id){
    const u=ideas.map(i=>i.id===id?{...i,downloadCount:(i.downloadCount||0)+1,lastDownloadAt:new Date().toISOString()}:i);
    setIdeas(u);await save('ideas_v2',u);
  }
  async function delIdea(id){
    if(!window.confirm('Remover?'))return;
    const u=ideas.filter(i=>i.id!==id);setIdeas(u);await save('ideas_v2',u);
    if(activeId===id){localStorage.removeItem('active_idea_id');setActiveId(null);}
  }
  async function setStatus(id,s){const u=ideas.map(i=>i.id===id?{...i,status:s}:i);setIdeas(u);await save('ideas_v2',u);}
  function activateIdea(id){
    localStorage.setItem('active_idea_id',id);
    setActiveId(id);
    setSwitchPrompt(null);
  }
  function deactivate(){
    localStorage.removeItem('active_idea_id');
    setActiveId(null);
  }
  function requestActivate(idea){
    if(activeId && activeId!==idea.id){
      const current=ideas.find(i=>i.id===activeId);
      setSwitchPrompt({from:current,to:idea});
    } else if(activeId===idea.id){
      deactivate();
    } else {
      activateIdea(idea.id);
    }
  }

  const [sort,setSort]=useState('recent');

  var filtered=ideas.filter(i=>{
    if(filter!=='todas'&&i.status!==filter)return false;
    if(search&&!i.name.toLowerCase().includes(search.toLowerCase())&&!i.category.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  if(sort==='recent'){filtered=filtered.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));}
  else if(sort==='oldest'){filtered=filtered.sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));}
  else if(sort==='score'){filtered=filtered.sort((a,b)=>{
    var sa=a.scores?((a.scores.mercado||0)+(a.scores.execucao||0)+(a.scores.inovacao||0)+(a.scores.receita||0)+(a.scores.risco||0)):0;
    var sb=b.scores?((b.scores.mercado||0)+(b.scores.execucao||0)+(b.scores.inovacao||0)+(b.scores.receita||0)+(b.scores.risco||0)):0;
    return sb-sa;
  });}
  else if(sort==='name'){filtered=filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));}
  else if(sort==='category'){filtered=filtered.sort((a,b)=>(a.category||'').localeCompare(b.category||''));}

  const cardS={background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'16px 18px',marginBottom:10};

  return (
    <div>
      {seeded&&<div style={{background:'rgba(22,163,74,0.1)',border:'1px solid rgba(22,163,74,0.3)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#4ade80'}}>✅ {SEED_IDEAS.length} ideias carregadas — todos os projetos das verticais, incluindo Venture OS, AgendaFácil e EstudaAí.</div>}
      {compareMode&&<div style={{background:'rgba(124,58,237,0.1)',border:'1px solid rgba(124,58,237,0.3)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:13,color:T.accent}}>⚖️ Modo comparação — selecione 2 ou 3 ideias para comparar lado a lado</div>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:18}}>
        <div>
          <div style={{fontSize:21,fontWeight:700,color:T.textStrong,marginBottom:3}}>💡 Minhas Ideias</div>
          <div style={{fontSize:13,color:T.muted}}>{ideas.length} ideia{ideas.length!==1?'s':''} cadastrada{ideas.length!==1?'s':''}</div>
        </div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
          <button onClick={()=>{
            var data=JSON.stringify({version:1,exportedAt:new Date().toISOString(),ideas:ideas},null,2);
            var blob=new Blob([data],{type:'application/json'});
            var url=URL.createObjectURL(blob);
            var a=document.createElement('a');
            a.href=url;a.download='idevia_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
            URL.revokeObjectURL(url);
          }} style={{background:'none',color:T.muted,border:`1px solid ${T.border}`,borderRadius:9,padding:'9px 12px',fontSize:12,cursor:'pointer'}} title="Exportar todas as ideias em arquivo JSON (backup)">📤 Backup</button>
          <label style={{background:'none',color:T.muted,border:`1px solid ${T.border}`,borderRadius:9,padding:'9px 12px',fontSize:12,cursor:'pointer'}} title="Importar ideias de arquivo JSON">
            📥 Restaurar
            <input type="file" accept="application/json,.json" style={{display:'none'}} onChange={e=>{
              var f=e.target.files[0];if(!f)return;
              var r=new FileReader();
              r.onload=async function(ev){
                try{
                  var data=JSON.parse(ev.target.result);
                  if(!data.ideas||!Array.isArray(data.ideas)){alert('Arquivo inválido.');return;}
                  var mode=window.confirm('Deseja SUBSTITUIR todas as ideias atuais?\n\nOK = Substituir\nCancelar = Adicionar (mesclar sem duplicatas)');
                  var merged;
                  if(mode){merged=data.ideas;}
                  else{
                    var existingIds={};ideas.forEach(function(i){existingIds[i.id]=true;});
                    var newOnes=data.ideas.filter(function(i){return !existingIds[i.id];});
                    merged=[...ideas,...newOnes];
                  }
                  setIdeas(merged);await save('ideas_v2',merged);
                  alert('Importado: '+data.ideas.length+' ideia(s). Total agora: '+merged.length);
                }catch(err){alert('Erro ao ler arquivo: '+err.message);}
              };
              r.readAsText(f);
              e.target.value='';
            }}/>
          </label>
          <button onClick={()=>{if(compareMode){setCompareMode(false);setCompareIds([]);}else{setCompareMode(true);setCompareIds([]);}}} style={{background:compareMode?'rgba(124,58,237,0.15)':'none',color:compareMode?T.accent:T.muted,border:`1px solid ${compareMode?T.accent+'44':T.border}`,borderRadius:9,padding:'9px 12px',fontSize:12,cursor:'pointer',fontWeight:compareMode?700:400}}>{compareMode?'✕ Cancelar':'⚖️ Comparar'}</button>
          <button onClick={()=>setShowGen(true)} style={{background:T.accentBg,color:T.accent,border:`1px solid ${T.accent}44`,borderRadius:9,padding:'9px 15px',fontSize:13,fontWeight:600,cursor:'pointer'}}>✨ Gerar Ideia</button>
          <button onClick={()=>{setPrefill(null);setShowCreate(true);}} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:9,padding:'9px 15px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ Nova Ideia</button>
        </div>
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar ideia..." style={{background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:8,padding:'8px 13px',color:T.text,fontSize:13,width:'100%',outline:'none',marginBottom:12}}/>

      {ideas.length>0&&(
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12,padding:'10px 14px',background:T.cardSm,border:`1px solid ${T.border}`,borderRadius:10}}>
          {(function(){
            var counts={total:ideas.length};
            Object.keys(STATUS_COLORS).forEach(function(s){counts[s]=ideas.filter(function(i){return i.status===s;}).length;});
            var withDocs=ideas.filter(function(i){return i.docs&&i.docs.length>0;}).length;
            var avgScore=0;var scoredCount=0;
            ideas.forEach(function(i){
              if(i.scores){
                var s=(i.scores.mercado||0)+(i.scores.execucao||0)+(i.scores.inovacao||0)+(i.scores.receita||0)+(i.scores.risco||0);
                if(s>0){avgScore+=s;scoredCount++;}
              }
            });
            if(scoredCount>0) avgScore=Math.round(avgScore/scoredCount);
            return (
              <>
                <div style={{fontSize:11,color:T.hint}}><strong style={{color:T.textStrong,fontSize:14}}>{counts.total}</strong> total</div>
                {counts['em execução']>0&&<div style={{fontSize:11,color:T.hint}}>· <strong style={{color:'#4ade80'}}>{counts['em execução']}</strong> em execução</div>}
                {counts['validando']>0&&<div style={{fontSize:11,color:T.hint}}>· <strong style={{color:'#60a5fa'}}>{counts['validando']}</strong> validando</div>}
                {counts['em análise']>0&&<div style={{fontSize:11,color:T.hint}}>· <strong style={{color:'#fbbf24'}}>{counts['em análise']}</strong> em análise</div>}
                {withDocs>0&&<div style={{fontSize:11,color:T.hint}}>· <strong style={{color:'#a78bfa'}}>{withDocs}</strong> com docs</div>}
                {scoredCount>0&&<div style={{fontSize:11,color:T.hint}}>· média: <strong style={{color:avgScore>=30?'#4ade80':avgScore>=20?'#fbbf24':'#f87171'}}>{avgScore}/50</strong></div>}
              </>
            );
          })()}
        </div>
      )}

      <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
        {['todas',...Object.keys(STATUS_COLORS)].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{padding:'4px 12px',borderRadius:20,border:`1px solid ${filter===s?(STATUS_COLORS[s]||T.accent)+'70':T.border}`,background:filter===s?(STATUS_COLORS[s]||T.accent)+'18':T.inputBg,color:filter===s?(STATUS_COLORS[s]||T.accent):T.muted,cursor:'pointer',fontSize:11,fontWeight:filter===s?700:400,textTransform:'capitalize'}}>
            {s==='todas'?`Todas (${ideas.length})`:s+' ('+ideas.filter(function(x){return x.status===s;}).length+')'}
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:T.hint}}>Ordenar:</span>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:7,padding:'4px 8px',color:T.text,fontSize:11,cursor:'pointer',outline:'none'}}>
            <option value="recent">Mais recentes</option>
            <option value="oldest">Mais antigas</option>
            <option value="score">Maior score</option>
            <option value="name">Nome (A–Z)</option>
            <option value="category">Categoria</option>
          </select>
        </div>
      </div>

      {filtered.length===0&&(
        <div style={{textAlign:'center',padding:'50px 20px',color:T.hint}}>
          <div style={{fontSize:40,marginBottom:10}}>💡</div>
          <div style={{fontSize:15,color:T.muted,marginBottom:16}}>Nenhuma ideia encontrada</div>
          <button onClick={()=>setShowCreate(true)} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:9,padding:'11px 22px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ Criar ideia</button>
        </div>
      )}

      {filtered.map(idea=>(
        <div key={idea.id} style={{...cardS,border:compareIds.indexOf(idea.id)>=0?'1px solid '+T.accent:cardS.border}} className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:9,marginBottom:9}}>
            {compareMode&&(
              <div onClick={()=>{var idx=compareIds.indexOf(idea.id);if(idx>=0){setCompareIds(compareIds.filter(function(x){return x!==idea.id;}));}else if(compareIds.length<3){setCompareIds([...compareIds,idea.id]);}}} style={{width:22,height:22,borderRadius:6,border:compareIds.indexOf(idea.id)>=0?'none':'2px solid '+T.border,background:compareIds.indexOf(idea.id)>=0?T.accent:T.inputBg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginTop:2}}>
                {compareIds.indexOf(idea.id)>=0&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}
              </div>
            )}
            <div style={{flex:1}}>
              <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap',marginBottom:4}}>
                <span style={{fontSize:15,fontWeight:700,color:T.textStrong}}>{idea.name}</span>
                <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:(STATUS_COLORS[idea.status]||'#64748b')+'22',color:STATUS_COLORS[idea.status]||'#94a3b8',border:`1px solid ${STATUS_COLORS[idea.status]||'#64748b'}44`,fontWeight:700}}>{idea.status}</span>
                {activeId===idea.id&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:'rgba(22,163,74,0.2)',color:'#4ade80',border:'1px solid rgba(22,163,74,0.5)',fontWeight:700}}>🟢 ATIVO</span>}
                <span style={{fontSize:11,color:T.hint}}>{idea.category}</span>
                {idea.createdAt&&<span style={{fontSize:10,color:T.hint}}>· {new Date(idea.createdAt).toLocaleDateString('pt-BR')}</span>}
              </div>
              <div style={{fontSize:12,color:T.muted,lineHeight:1.6}}>{(idea.desc||'').slice(0,120)}{(idea.desc||'').length>120?'...':''}</div>
            </div>
            <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
              <button onClick={()=>requestActivate(idea)} style={{background:activeId===idea.id?'rgba(22,163,74,0.15)':'transparent',color:activeId===idea.id?'#4ade80':T.muted,border:`1px solid ${activeId===idea.id?'rgba(22,163,74,0.4)':T.border}`,borderRadius:7,padding:'5px 11px',fontSize:11,cursor:'pointer',fontWeight:600}} title={activeId===idea.id?'Desativar projeto':'Ativar projeto para seguir o Guia'}>
                {activeId===idea.id?'🟢 Ativo':'⚪ Ativar'}
              </button>
              <button onClick={()=>setSelected(idea)} style={{background:T.accentBg,color:T.accent,border:`1px solid ${T.accent}33`,borderRadius:7,padding:'5px 11px',fontSize:11,cursor:'pointer'}}>Ver detalhes</button>
              <button onClick={()=>setEditing(idea)} style={{background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,padding:'5px 9px',fontSize:11,cursor:'pointer'}} title="Editar">✏️</button>
              <button onClick={()=>duplicateIdea(idea)} style={{background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,padding:'5px 9px',fontSize:11,cursor:'pointer'}} title="Duplicar">📋</button>
              <button onClick={()=>delIdea(idea.id)} style={{background:'none',border:'none',color:'rgba(220,38,38,0.4)',cursor:'pointer',fontSize:15}}>🗑</button>
            </div>
          </div>
          {idea.scores&&(
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8,paddingTop:8,borderTop:`1px solid ${T.border}`,alignItems:'center'}}>
              {(function(){var t=(idea.scores.mercado||0)+(idea.scores.execucao||0)+(idea.scores.inovacao||0)+(idea.scores.receita||0)+(idea.scores.risco||0);var c=t>=35?'#16a34a':t>=25?'#d97706':'#dc2626';return <span style={{fontSize:12,fontWeight:800,color:c,marginRight:4}}>{t}<span style={{fontSize:9,fontWeight:400,color:T.hint}}>/50</span></span>;})()}
              {['mercado','execucao','inovacao','receita','risco'].map(k=>{
                var v=idea.scores[k];
                if(typeof v!=='number') return null;
                return (
                  <div key={k} style={{display:'flex',gap:3,alignItems:'center'}}>
                    <div style={{width:28,height:4,borderRadius:99,background:'rgba(255,255,255,0.08)',overflow:'hidden'}}><div style={{width:`${v*10}%`,height:'100%',background:v>=7?'#16a34a':v>=5?'#d97706':'#dc2626',borderRadius:99}}/></div>
                    <span style={{fontSize:10,color:T.hint}}>{k}</span>
                  </div>
                );
              })}
              {idea.docs&&idea.docs.length>0&&<span style={{fontSize:10,color:T.hint,marginLeft:4}}>· {idea.docs.length} docs</span>}
            </div>
          )}
          <select value={idea.status} onChange={e=>setStatus(idea.id,e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:'3px 8px',color:T.muted,fontSize:11,cursor:'pointer',outline:'none'}}>
            {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
      ))}

      {/* SWITCH ACTIVE PROJECT MODAL */}
      {switchPrompt&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,width:'100%',maxWidth:440,padding:24}}>
            <div style={{fontSize:18,fontWeight:700,color:T.textStrong,marginBottom:10}}>🔄 Trocar projeto ativo?</div>
            <div style={{fontSize:13,color:T.muted,lineHeight:1.7,marginBottom:16}}>
              Atualmente ativo: <strong style={{color:T.text}}>{switchPrompt.from&&switchPrompt.from.name}</strong>
              <br/>
              Novo ativo: <strong style={{color:'#4ade80'}}>{switchPrompt.to.name}</strong>

                        +'<script>window.addEventListener("load",function(){'+chartScript+'});<\/script>'
                        +'</body></html>';
                      var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='idevia_'+selected.name.replace(/\s+/g,'_')+'.html';a.click();URL.revokeObjectURL(url);
                      trackDownload(selected.id);
                    }} style={{background:'#2563eb',color:'white',border:'none',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>⬇️ Baixar</button>

<script type="text/babel">

  const inp={background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:8,padding:'10px 12px',color:T.text,fontSize:13,width:'100%',outline:'none',fontFamily:'inherit'};

  function flash(){setSaved(true);setTimeout(()=>setSaved(false),2200);}

  function saveIdentity(){
    onSave(name,icon);
    flash();
  }

  function saveFounder(){
    localStorage.setItem('founder-profile',JSON.stringify(founder));
    flash();
  }

  function savePrefs(){
    localStorage.setItem('user-prefs',JSON.stringify(prefs));
    flash();
  }

  function saveIntegrations(){
    if(apiKey) localStorage.setItem('openai-key',apiKey);
    if(anthropicKey) localStorage.setItem('anthropic-key',anthropicKey);
    flash();
  }

  function exportData(){
    const data={ideas:localStorage.getItem('ideas_v2'),backlog:localStorage.getItem('backlog-v2'),members:localStorage.getItem('members-v2'),credentials:localStorage.getItem('credentials-v2'),gdrive:localStorage.getItem('gdrive-created-v2'),links:localStorage.getItem('gdrive-links-v2'),guia:localStorage.getItem('guia-done-v2'),founderProfile:localStorage.getItem('founder-profile'),appName:localStorage.getItem('app-name'),appIcon:localStorage.getItem('app-icon'),theme:localStorage.getItem('theme'),exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`venture_os_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
    URL.revokeObjectURL(url);
    setExportMsg('✓ Backup exportado com sucesso!');
    setTimeout(()=>setExportMsg(''),3000);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.ideas)localStorage.setItem('ideas_v2',d.ideas);
        if(d.backlog)localStorage.setItem('backlog-v2',d.backlog);
        if(d.members)localStorage.setItem('members-v2',d.members);
        if(d.appName)localStorage.setItem('app-name',d.appName);
        if(d.appIcon)localStorage.setItem('app-icon',d.appIcon);
        if(d.theme)localStorage.setItem('theme',d.theme);
        setExportMsg('✓ Dados importados! Recarregue a página.');
        setTimeout(()=>setExportMsg(''),4000);
      }catch(err){setExportMsg('✗ Arquivo inválido.');}
    };
    reader.readAsText(file);
  }

  function clearAll(){
    if(!window.confirm('Apagar TODOS os dados do sistema? Esta ação não pode ser desfeita.'))return;

    {label:'Símbolos',icons:['🎪','🦅','🦁','🏄','🎨','🧭','🗺️','🎩','🌀','♾️']},

    {id:'perfil',icon:'👤',label:'Perfil'},
    {id:'aparencia',icon:'🎨',label:'Aparência'},
    {id:'integracoes',icon:'🔌',label:'Integrações'},

function BacklogPage({T}){
  const [items,setItems]=useState(()=>JSON.parse(localStorage.getItem('backlog-v2')||JSON.stringify(INITIAL_BACKLOG)));
  const [filter,setFilter]=useState('todos');
  const [showAdd,setShowAdd]=useState(false);
  const [newItem,setNewItem]=useState({emoji:'💡',name:'',diff:3,valid:3,pot:3,temp:3,status:'futuro',vertical:''});
  const inp={background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:8,padding:'8px 11px',color:T.text,fontSize:13,width:'100%',outline:'none'};
  const statusColors={futuro:'#16a34a',inviavel:'#dc2626',descartado:'#64748b',b2b:'#2563eb'};
  const statusLabels={futuro:'Futuro',inviavel:'Inviável',descartado:'Descartado',b2b:'B2B'};

  function save2(d){setItems(d);localStorage.setItem('backlog-v2',JSON.stringify(d));}
  function add(){
    if(!newItem.name.trim())return;
    save2([...items,{...newItem,id:'bl'+Date.now()}]);
    setNewItem({emoji:'💡',name:'',diff:3,valid:3,pot:3,temp:3,status:'futuro',vertical:''});
    setShowAdd(false);
  }
  function del(id){if(!window.confirm('Remover?'))return;save2(items.filter(i=>i.id!==id));}

  const sorted=[...items].filter(i=>filter==='todos'||i.status===filter).sort((a,b)=>calcPri(b)-calcPri(a));

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:18}}>
        <div><div style={{fontSize:21,fontWeight:700,color:T.textStrong}}>🗃️ Backlog Estratégico</div>
        <div style={{fontSize:13,color:T.muted}}>{items.length} ideias · ordenadas por prioridade</div></div>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ Nova ideia</button>
      </div>
      {showAdd&&(
        <div style={{background:T.card,border:`1px solid ${T.accent}44`,borderRadius:14,padding:'18px 20px',marginBottom:16}}>
          <div style={{display:'grid',gridTemplateColumns:'60px 1fr 120px',gap:9,marginBottom:10}}>
            <input value={newItem.emoji} onChange={e=>setNewItem(p=>({...p,emoji:e.target.value}))} style={{...inp,textAlign:'center',fontSize:18}}/>
            <input value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))} placeholder="Nome da ideia" style={inp}/>
            <input value={newItem.vertical} onChange={e=>setNewItem(p=>({...p,vertical:e.target.value}))} placeholder="Vertical" style={inp}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:9,marginBottom:12}}>
            {[['diff','Dificuldade'],['valid','Validação'],['pot','Potencial'],['temp','Temperatura']].map(([k,l])=>(
              <div key={k}><div style={{fontSize:10,color:T.muted,marginBottom:3}}>{l}</div>
              <select value={newItem[k]} onChange={e=>setNewItem(p=>({...p,[k]:+e.target.value}))} style={inp}>
                {[1,2,3,4,5].map(v=><option key={v}>{v}</option>)}</select></div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={add} style={{background:'#16a34a',color:'white',border:'none',borderRadius:8,padding:'9px 18px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Adicionar</button>
            <button onClick={()=>setShowAdd(false)} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 14px',fontSize:13,cursor:'pointer'}}>Cancelar</button>
          </div>
        </div>
      )}
      <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:16}}>
        {['todos','futuro','inviavel','descartado','b2b'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'4px 12px',borderRadius:20,border:`1px solid ${filter===f?(statusColors[f]||T.accent)+'70':T.border}`,background:filter===f?(statusColors[f]||T.accent)+'18':T.inputBg,color:filter===f?(statusColors[f]||T.accent):T.muted,cursor:'pointer',fontSize:11,fontWeight:filter===f?700:400}}>
            {f==='todos'?`Todos (${items.length})`:statusLabels[f]||f}
          </button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {sorted.map((item,i)=>{
          const score=calcPri(item);
          const sc=statusColors[item.status]||'#64748b';
          return(
            <div key={item.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:'13px 16px',display:'flex',gap:12,alignItems:'flex-start'}} className="fade-in">
              <div style={{fontSize:11,color:T.hint,width:22,flexShrink:0,paddingTop:2}}>#{i+1}</div>
              <div style={{fontSize:22,flexShrink:0}}>{item.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap',marginBottom:5}}>
                  <span style={{fontSize:14,fontWeight:700,color:T.textStrong}}>{item.name}</span>
                  <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:sc+'20',color:sc,border:`1px solid ${sc}44`,fontWeight:700}}>{statusLabels[item.status]||item.status}</span>
                  {item.vertical&&<span style={{fontSize:11,color:T.hint}}>{item.vertical}</span>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                  {[['Facilidade',6-item.diff],['Validação',item.valid],['Potencial',item.pot],['Temperatura',item.temp]].map(([l,v])=>(
                    <div key={l}><div style={{fontSize:9,color:T.hint,marginBottom:2}}>{l}</div>
                    <div style={{display:'flex',gap:2}}>{[1,2,3,4,5].map(n=><div key={n} style={{width:7,height:7,borderRadius:'50%',background:n<=v?T.accent:'rgba(255,255,255,0.12)'}}/>)}</div></div>
                  ))}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:19,fontWeight:700,color:score>=4?'#4ade80':score>=3?'#fbbf24':'#f87171'}}>{score.toFixed(1)}</div>
                <div style={{fontSize:9,color:T.hint}}>prioridade</div>
                <button onClick={()=>del(item.id)} style={{marginTop:6,background:'none',border:'none',color:'rgba(220,38,38,0.35)',cursor:'pointer',fontSize:14}}>🗑</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

];

function buildTree(items){const map={};items.forEach(i=>{map[i.id]={...i,children:[]};});const roots=[];items.forEach(i=>{if(i.parentId&&map[i.parentId])map[i.parentId].children.push(map[i.id]);else if(!i.parentId)roots.push(map[i.id]);});return roots;}

function FolderNode({node,depth,T,created,toggle,links,setLinks,editing,setEditing}){
  const [open,setOpen]=useState(depth<1);
  const [editUrl,setEditUrl]=useState('');
  const isFolder=node.type==='folder'||node.type==='root';
  const isDone=created[node.id];
  const savedLink=links[node.id]||'';
  const isEditing=editing===node.id;
  const hasChildren=node.children&&node.children.length>0;

  function saveLink(){const n={...links,[node.id]:editUrl};setLinks(n);localStorage.setItem('gdrive-links-v2',JSON.stringify(n));setEditing(null);}

  return(
    <div>
      <div style={{marginLeft:depth*20,display:'flex',gap:7,alignItems:'center',padding:'7px 11px',background:isDone?`${node.color}12`:'transparent',border:`1px solid ${isDone?node.color+'35':T.border}`,borderRadius:9,marginBottom:4,transition:'all .15s'}}>
        {isFolder&&hasChildren?(
          <button onClick={()=>setOpen(!open)} style={{width:18,height:18,borderRadius:4,background:'none',border:'none',cursor:'pointer',color:T.muted,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{open?'▾':'▸'}</button>
        ):<div style={{width:18,flexShrink:0}}/>}
        <span style={{fontSize:15,flexShrink:0}}>{node.type==='root'?'🚀':node.type==='folder'?'📁':'📄'}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:isFolder?700:400,color:isDone?node.color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.name}</div>
          {node.desc&&<div style={{fontSize:11,color:T.hint}}>{node.desc}</div>}
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center',flexShrink:0}}>
          {savedLink?(<a href={savedLink} target="_blank" rel="noreferrer" style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:node.color+'22',color:node.color,border:`1px solid ${node.color}44`,fontWeight:600,textDecoration:'none'}}>📂 Abrir</a>):(<span style={{fontSize:11,color:T.hint,fontStyle:'italic'}}>sem link</span>)}
          <button onClick={()=>{setEditUrl(savedLink);setEditing(node.id);}} title="Colar link do Drive" style={{background:'none',border:`1px solid ${T.border}`,borderRadius:6,padding:'2px 6px',cursor:'pointer',fontSize:11,color:T.muted}}>🔗</button>
          {isFolder&&(<div onClick={()=>toggle(node.id)} style={{width:18,height:18,borderRadius:4,background:isDone?node.color:T.inputBg,border:isDone?'none':`2px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            {isDone&&<span style={{color:'white',fontSize:10}}>✓</span>}
          </div>)}
        </div>
      </div>
      {isEditing&&(
        <div style={{marginLeft:depth*20+36,marginBottom:6,display:'flex',gap:6}}>
          <input value={editUrl} onChange={e=>setEditUrl(e.target.value)} placeholder="Cole o link do Google Drive..." style={{flex:1,background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:7,padding:'6px 10px',color:T.text,fontSize:12,outline:'none'}}/>
          <button onClick={saveLink} style={{background:'#16a34a',color:'white',border:'none',borderRadius:7,padding:'6px 12px',fontSize:12,cursor:'pointer',fontWeight:600}}>Salvar</button>
          <button onClick={()=>setEditing(null)} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:'6px 8px',fontSize:12,cursor:'pointer'}}>✕</button>
        </div>
      )}
      {isFolder&&open&&hasChildren&&(
        <div>{node.children.map(child=><FolderNode key={child.id} node={child} depth={depth+1} T={T} created={created} toggle={toggle} links={links} setLinks={setLinks} editing={editing} setEditing={setEditing}/>)}</div>
      )}
    </div>
  );
}

  const steps=[

     items:['Conversar com 10 clientes potenciais do seu nicho (pessoalmente se possível)','Entrar em 3–5 comunidades online do público-alvo (grupos de WhatsApp, Facebook, fóruns)','Perguntar: "Você pagaria por isso? Quanto?" — sem vender, só escutar','Meta: 20–30 pessoas com interesse real demonstrado','Criar landing page simples com formulário de interesse e preço sugerido']},

     items:['GitHub (github.com) — gratuito, versionamento de código','Hospedagem: Railway, Vercel ou Hostinger — R$0–50/mês','Banco de dados: Supabase — gratuito no início','Meio de pagamento: Mercado Pago, Stripe ou Pagar.me','IA se necessário: OpenAI ou Anthropic — colocar limite de gastos','Registrar domínio .com.br no Registro.br — ~R$40/ano']},
    {emoji:'💻',title:'Etapa 3 — Construir MVP',duration:'Semanas 4–10',goal:'Produto funcionando com 5 usuários reais no beta',color:'#16a34a',
     items:['Definir funcionalidades MÍNIMAS (cortar tudo que não é essencial)','Escolher stack técnica simples (Next.js + Supabase é uma boa base)','Se não sabe codar, contratar freelancer (GetNinjas, Workana) — R$3–6k','Validar legalidade/regulamentação do seu nicho ANTES de lançar','Testar com 5 usuários reais antes de abrir inscrições','Não construa nada além do MVP — feedback primeiro']},
    {emoji:'💳',title:'Etapa 4 — Primeiros pagantes',duration:'Semanas 11–16',goal:'Primeiro pagamento real na conta',color:'#7c3aed',
     items:['Ligar (não mensagem) para cada usuário do beta','Configurar assinatura ou pagamento no Mercado Pago/Stripe','Oferecer trial gratuito de 7–14 dias','Definir preço inicial e testar variações','Pedir 3 indicações a cada cliente que pagar','Meta: primeiros 10–20 pagantes → primeiros R$ de MRR']},
    {emoji:'📈',title:'Etapa 5 — Escalar para 100 clientes',duration:'Meses 5–12',goal:'Crescimento consistente com retenção',color:'#0891b2',

  ];

  const [activeIdea,setActiveIdea]=useState(null);

  useEffect(()=>{
    if(!activeId){setActiveIdea(null);setDone({});return;}
    load('ideas_v2',[]).then(ideas=>{
      var idea=ideas.find(i=>i.id===activeId);
      if(idea){
        setActiveIdea(idea);
        setDone(idea.guideProgress||{});
      } else {
        localStorage.removeItem('active_idea_id');
        setActiveId(null);
      }
    });
  },[activeId]);

  async function toggle(key){
    var n={...done,[key]:!done[key]};
    setDone(n);

      var ideas=await load('ideas_v2',[]);
      var updated=ideas.map(i=>i.id===activeIdea.id?{...i,guideProgress:n}:i);
      await save('ideas_v2',updated);
    }

    var ideas=await load('ideas_v2',[]);
    var updated=ideas.map(i=>i.id===activeIdea.id?{...i,guideProgress:done}:i);

    setSavedAt(new Date());
    setTimeout(()=>setSavedAt(null),3000);

        </div>
      </div>
    );
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10,marginBottom:4}}>
        <div>
          <div style={{fontSize:21,fontWeight:700,color:T.textStrong,marginBottom:4}}>📋 Guia de Implantação</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:16}}>

          </div>
        </div>
        <button onClick={saveProgress} style={{background:'#16a34a',color:'white',border:'none',borderRadius:9,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
          💾 {savedAt?'Salvo!':'Salvar progresso'}
        </button>
      </div>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:'12px 16px',marginBottom:18}}>

        const stepPct=Math.round(stepDone/step.items.length*100);
        return(
