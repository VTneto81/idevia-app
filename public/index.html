// ── STORAGE ──────────────────────────────────────────────
const IS_SERVER = window.location.protocol !== 'file:' && !window.location.hostname.includes('claude');
async function save(key, val) {
  const str = JSON.stringify(val);
  if (IS_SERVER) { try { await fetch(`/api/data/${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:str})}); return; } catch(e){} }
  localStorage.setItem(key, str);
}
async function load(key, def) {
  if (IS_SERVER) { try { const r=await fetch(`/api/data/${key}`); const d=await r.json(); return d.value?JSON.parse(d.value):def; } catch(e){} }
  try { const r=localStorage.getItem(key); return r?JSON.parse(r):def; } catch(e){ return def; }
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function ai(messages, system, maxTokens=1200) {
  const anthropicKey = localStorage.getItem('anthropic-key') || '';
  const openaiKey = localStorage.getItem('openai-key') || '';
  if (!anthropicKey && !openaiKey) throw new Error('SEM_CHAVE');

  // Prefer OpenAI if Anthropic key has no credits, or if OpenAI key is set
  if (openaiKey) {
    const msgs = system ? [{role:'system',content:system},...messages] : messages;
    const res = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTokens,messages:msgs})
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error.message||'Erro OpenAI');
    return d.choices?.[0]?.message?.content || 'Resposta vazia.';
  }

  // Fallback to Anthropic
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,system,messages})
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message||'Erro Anthropic');
  return d.content?.map(b=>b.text||'').join('')||'Resposta vazia.';
}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── UTILS + MODALS ─── */

function ScoreBar({label,score,color,T}){
  return (
    <div style={{marginBottom:7}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontSize:12,color:T.muted}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color:color}}>{score}/10</span>
      </div>
      <div style={{background:T.progressBar,borderRadius:99,height:5,overflow:'hidden'}}>
        <div style={{width:`${score*10}%`,height:'100%',background:color,borderRadius:99,transition:'width .6s'}}/>
      </div>
    </div>
  );
}

// ── ANALYSIS RENDER ──────────────────────────────────────────────────────────
function AnalysisBlock({analysis,T}){
  if (!analysis) return null;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {analysis.split('\n\n').filter(s=>s.trim()).map((sec,i)=>{
        const isWarn = /⚠️|risco|problema/i.test(sec);
        const isGood = /✅|potencial|oportunidade/i.test(sec);
        const isTitle = /^##/.test(sec);
        const text = sec.replace(/^##\s*/,'').replace(/\*\*/g,'').replace(/\*/g,'').trim();
        return (
          <div key={i} style={{background:isWarn?'rgba(220,38,38,0.08)':isGood?'rgba(22,163,74,0.08)':T.inputBg,border:`1px solid ${isWarn?'rgba(220,38,38,0.25)':isGood?'rgba(22,163,74,0.25)':T.border}`,borderRadius:9,padding:'10px 14px',fontSize:13,color:T.text,lineHeight:1.75}}>
            {isTitle?<span style={{color:T.textStrong,fontSize:14,fontWeight:600}}>{text}</span>:text}
          </div>
        );
      })}
    </div>
  );
}

// ── CREATE IDEA MODAL ─────────────────────────────────────────────────────────

function CreateIdeaModal({T,onClose,onCreated,prefill}){
  const [step,setStep]=useState('form');
  const [form,setForm]=useState(prefill||{name:'',category:'SaaS / Software',desc:'',target:'',problem:'',model:''});
  const [analysis,setAnalysis]=useState(null);
  const [scores,setScores]=useState(null);
  const [docProgress,setDocProgress]=useState([]);
  const [allDocs,setAllDocs]=useState([]);
  const allDocsRef=useRef([]);

  async function analyzeIdea(){
    if(!form.name.trim()||!form.desc.trim()) return;
    setStep('analyzing');
    try {
      const resp = await ai([{role:'user',content:`Analise esta ideia de negócio de forma CRÍTICA, REALISTA e IMPARCIAL — sem romantismo.\n\nIDEIA: ${form.name}\nCATEGORIA: ${form.category}\nDESCRIÇÃO: ${form.desc}\nPÚBLICO: ${form.target||'não especificado'}\nPROBLEMA: ${form.problem||'não especificado'}\nMODELO: ${form.model||'não especificado'}\n\n## 🎯 Resumo executivo\n## ✅ Pontos fortes reais\n## ⚠️ Riscos e problemas sérios\n## 🏆 Concorrência e diferenciação\n## 💰 Potencial de receita realista\n## 🚀 Próximo passo mais importante\n## 📊 Veredicto (VIÁVEL / VIÁVEL COM RESSALVAS / INVIÁVEL)\n\nFinal da análise retorne:\nSCORES:mercado=X,execucao=X,inovacao=X,receita=X,risco=X`}],
        'Consultor de negócios sênior. Seja direto, crítico e útil.',2000);
      const sm = resp.match(/SCORES:([^\n]+)/);
      let ps = {mercado:6,execucao:6,inovacao:6,receita:6,risco:6};
      if(sm) sm[1].split(',').forEach(p=>{const[k,v]=p.split('=');if(k&&v)ps[k.trim()]=parseInt(v)||6;});
      setScores(ps); setAnalysis(resp.replace(/SCORES:[^\n]+/,'').trim()); setStep('result');
    } catch(e){
      if(e.message==='SEM_CHAVE'){
        setAnalysis('## ⚙️ Chave API não configurada\n\nVá em Configurações → Integrações e cole sua chave Anthropic (console.anthropic.com). É gratuito para começar.');
      } else {
        setAnalysis('## ❌ Erro de conexão\n\nVerifique sua chave API em Configurações → Integrações. Detalhe: '+e.message);
      }
      setStep('result');
    }
  }

  async function generateDocs(){
    setStep('docs');
    const docs=[
      {name:'01. Sumário Executivo',q:'Crie o sumário executivo: problema, solução, proposta de valor única. 200 palavras.'},
      {name:'02. Análise de Mercado',q:'Análise de mercado: TAM/SAM/SOM estimados, concorrência, tendências. 200 palavras.'},
      {name:'03. Modelo de Negócio',q:'Modelo de negócio: canais, receita, estrutura de custos, parcerias. 200 palavras.'},
      {name:'04. Plano de Validação MVP',q:'Plano de validação: hipóteses a testar, como testar sem código, métricas de sucesso. 200 palavras.'},
      {name:'05. Roadmap 90 dias',q:'Roadmap de 90 dias da ideia ao primeiro cliente pagante. Semana a semana. 200 palavras.'},
      {name:'06. Análise Financeira',q:'Projeção financeira: custo mínimo de operação, break-even, MRR em 6/12 meses. 200 palavras.'},
      {name:'07. Riscos e Mitigações',q:'Top 7 riscos com probabilidade, impacto e mitigação. 200 palavras.'},
      {name:'08. Plano Pós-lançamento',q:'Estratégia de crescimento, retenção e expansão após o lançamento. 200 palavras.'},
    ];
    const generated=[];
    for(let i=0;i<docs.length;i++){
      setDocProgress(prev=>[...prev,{...docs[i],status:'gerando'}]);
      try{
        const c=await ai([{role:'user',content:`Para a ideia "${form.name}" (${form.category}): ${form.desc}\n\n${docs[i].q}`}],'Consultor de negócios. Seja prático e específico.',600);
        generated.push({...docs[i],content:c,status:'pronto'});
        setDocProgress(prev=>prev.map((d,idx)=>idx===i?{...d,status:'pronto'}:d));
      }catch(e){
        generated.push({...docs[i],content:'Erro ao gerar.',status:'erro'});
        setDocProgress(prev=>prev.map((d,idx)=>idx===i?{...d,status:'erro'}:d));
      }
      await new Promise(r=>setTimeout(r,200));
    }
    setAllDocs(generated);
  }

  function downloadReport(){
    const docs=allDocsRef.current.length>0?allDocsRef.current:allDocs;
    const sc=scores||{};
    const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const css='*{box-sizing:border-box;margin:0;padding:0}body{font-family:Segoe UI,sans-serif;background:#0f0f1a;color:#e2e8f0;padding:24px}h1{font-size:26px;color:#a78bfa;margin-bottom:6px}.sub{font-size:13px;color:#64748b;margin-bottom:28px}.scores{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}.sc{background:#1e1b33;border:1px solid #2d2a4a;border-radius:10px;padding:14px 18px;min-width:120px;text-align:center}.sl{font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:6px}.sv{font-size:28px;font-weight:700;color:#a78bfa}.sb{height:4px;border-radius:99px;background:#2d2a4a;margin-top:8px;overflow:hidden}.sf{height:100%;border-radius:99px;background:linear-gradient(90deg,#7c3aed,#a78bfa)}.section{background:#1a1730;border:1px solid #2d2a4a;border-radius:12px;padding:20px 22px;margin-bottom:16px}.section h2{font-size:15px;font-weight:700;color:#a78bfa;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2d2a4a}p,li{font-size:13px;color:#cbd5e1;line-height:1.75;white-space:pre-wrap}.footer{margin-top:32px;font-size:11px;color:#334155;text-align:center}';
    let scoresHtml='';
    Object.entries(sc).forEach(([k,v])=>{scoresHtml+='<div class="sc"><div class="sl">'+k+'</div><div class="sv">'+v+'</div><div class="sb"><div class="sf" style="width:'+v*10+'%"></div></div></div>';});
    let docsHtml='';
    docs.forEach(d=>{docsHtml+='<div class="section"><h2>'+esc(d.name)+'</h2><p>'+esc(d.content)+'</p></div>';});
    const html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>'+esc(form.name)+'</title><style>'+css+'</style></head><body>'
      +'<h1>'+esc(form.name)+'</h1>'
      +'<div class="sub">'+esc(form.category)+' · Gerado pelo idevIA em '+new Date().toLocaleDateString('pt-BR')+'</div>'
      +'<div class="scores">'+scoresHtml+'</div>'
      +(form.desc?'<div class="section"><h2>Descrição</h2><p>'+esc(form.desc)+'</p></div>':'')
      +(form.target?'<div class="section"><h2>Público-alvo</h2><p>'+esc(form.target)+'</p></div>':'')
      +(form.problem?'<div class="section"><h2>Problema que resolve</h2><p>'+esc(form.problem)+'</p></div>':'')
      +(form.model?'<div class="section"><h2>Modelo de receita</h2><p>'+esc(form.model)+'</p></div>':'')
      +'<div class="section"><h2>Análise estratégica</h2><p>'+esc((analysis||'').replace(/SCORES:[^
]+/,''))+'</p></div>'
      +docsHtml
      +'<div class="footer">Gerado pelo idevIA</div></body></html>';
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='idevia_'+form.name.replace(/\s+/g,'_')+'.html';a.click();URL.revokeObjectURL(url);
  }

  function confirmCreate(){
    const docs=allDocsRef.current.length>0?allDocsRef.current:allDocs;
    const idea={
      id:'idea_'+Date.now(),...form,status:'em análise',analysis:analysis||'',scores:scores||{},docs:docs,
      folders:[
        {id:'r',name:`💡 ${form.name}`,type:'root',parentId:null},
        {id:'f1',name:'📋 01. Estratégia',type:'folder',parentId:'r'},
        {id:'f2',name:'🔬 02. Validação',type:'folder',parentId:'r'},
        {id:'f3',name:'🛠️ 03. Desenvolvimento',type:'folder',parentId:'r'},
        {id:'f4',name:'🚀 04. Lançamento',type:'folder',parentId:'r'},
        {id:'f5',name:'📈 05. Crescimento',type:'folder',parentId:'r'},
        {id:'f6',name:'💰 06. Financeiro',type:'folder',parentId:'r'},
      ],
      createdAt:new Date().toISOString()
    };
    onCreated(idea); onClose();
  }

  const inp={background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:8,padding:'10px 12px',color:T.text,fontSize:14,width:'100%',outline:'none'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:16,overflowY:'auto'}}>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,width:'100%',maxWidth:660,margin:'auto'}} className="fade-in">
        <div style={{padding:'18px 22px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:16,fontWeight:700,color:T.textStrong}}>
            {step==='form'&&'💡 Nova Ideia'}{step==='analyzing'&&'🤖 Analisando...'}{step==='result'&&'📊 Análise Completa'}{step==='docs'&&'📄 Gerando Documentação'}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.muted,fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'18px 22px',maxHeight:'78vh',overflowY:'auto'}}>

          {step==='form'&&(
            <div style={{display:'flex',flexDirection:'column',gap:13}}>
              <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Nome *</div><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ex: AgendaFácil..." style={inp}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Categoria *</div><select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={inp}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Descrição *</div><textarea value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} rows={3} placeholder="O que é? Como funciona? O que torna diferente?" style={{...inp,resize:'vertical'}}/></div>
              <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Público-alvo</div><input value={form.target} onChange={e=>setForm(p=>({...p,target:e.target.value}))} placeholder="Ex: autônomos, pais..." style={inp}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Modelo de receita</div><input value={form.model} onChange={e=>setForm(p=>({...p,model:e.target.value}))} placeholder="Ex: R$39/mês, comissão..." style={inp}/></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Problema que resolve</div><input value={form.problem} onChange={e=>setForm(p=>({...p,problem:e.target.value}))} placeholder="Qual dor real essa ideia resolve?" style={inp}/></div>
              <button onClick={analyzeIdea} disabled={!form.name.trim()||!form.desc.trim()} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:10,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',opacity:(!form.name.trim()||!form.desc.trim())?0.4:1}}>
                🤖 Analisar com IA
              </button>
            </div>
          )}

          {step==='analyzing'&&(
            <div style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:44,marginBottom:14}}>🤖</div>
              <div style={{fontSize:15,fontWeight:700,color:T.textStrong,marginBottom:8}}>Analisando sua ideia...</div>
              <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap'}}>
                {['Mercado','Concorrência','Viabilidade','Riscos','Receita'].map((l,i)=>(
                  <div key={l} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:T.accentBg,color:T.accent,animation:`pulse 1.5s ${i*0.25}s infinite`}}>{l}</div>
                ))}
              </div>
            </div>
          )}

          {step==='result'&&(
            <div>
              {scores&&(
                <div style={{background:T.cardSm,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px',marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.textStrong,marginBottom:10}}>📊 Scores</div>
                  <ScoreBar label="Mercado" score={scores.mercado} color="#16a34a" T={T}/>
                  <ScoreBar label="Execução" score={scores.execucao} color="#2563eb" T={T}/>
                  <ScoreBar label="Inovação" score={scores.inovacao} color="#7c3aed" T={T}/>
                  <ScoreBar label="Receita" score={scores.receita} color="#d97706" T={T}/>
                  <ScoreBar label="Baixo risco" score={scores.risco} color="#16a34a" T={T}/>
                </div>
              )}
              <AnalysisBlock analysis={analysis} T={T}/>
              <div style={{display:'flex',gap:9,marginTop:18,flexWrap:'wrap'}}>
                <button onClick={generateDocs} style={{flex:1,minWidth:150,background:'#16a34a',color:'white',border:'none',borderRadius:10,padding:'11px',fontSize:13,fontWeight:700,cursor:'pointer'}}>✅ Avançar — Gerar documentação</button>
                <button onClick={onClose} style={{flex:1,minWidth:100,background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:10,padding:'11px',fontSize:13,cursor:'pointer'}}>✕ Descartar</button>
              </div>
            </div>
          )}

          {step==='docs'&&(
            <div>
              <div style={{fontSize:13,color:T.muted,marginBottom:14}}>Gerando documentação completa...</div>
              <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:18}}>
                {['01. Sumário Executivo','02. Análise de Mercado','03. Modelo de Negócio','04. Plano de Validação MVP','05. Roadmap 90 dias','06. Análise Financeira','07. Riscos e Mitigações','08. Plano Pós-lançamento'].map((name,i)=>{
                  const p=docProgress[i]; const s=p?p.status:'aguardando';
                  return (
                    <div key={name} style={{display:'flex',gap:10,alignItems:'center',padding:'9px 13px',background:T.cardSm,border:`1px solid ${s==='pronto'?'rgba(22,163,74,0.3)':T.border}`,borderRadius:9}}>
                      <span style={{fontSize:15,flexShrink:0}}>{s==='pronto'?'✅':s==='gerando'?'⏳':s==='erro'?'❌':'⏸️'}</span>
                      <span style={{fontSize:12,color:s==='pronto'?'#4ade80':s==='gerando'?T.accent:T.muted,flex:1}}>{name}</span>
                      {s==='gerando'&&<div style={{width:12,height:12,border:`2px solid ${T.accent}`,borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>}
                    </div>
                  );
                })}
              </div>
              {allDocs.length===8&&(
                <>
                  <div style={{background:'rgba(22,163,74,0.1)',border:'1px solid rgba(22,163,74,0.3)',borderRadius:12,padding:'14px',marginBottom:14,textAlign:'center'}}>
                    <div style={{fontSize:15,fontWeight:700,color:'#4ade80',marginBottom:4}}>🎉 Documentação completa!</div>
                    <div style={{fontSize:12,color:T.muted}}>8 documentos + estrutura de pastas criados. Confirme para salvar.</div>
                  </div>
                  <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>

              )}

          )}

function GenerateModal({T,onClose,onSelect}){
  const [niche,setNiche]=useState('');

            <button onClick={generate} disabled={loading||!niche.trim()} style={{background:T.btnPrimary,color:T.btnPrimaryText,border:'none',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer',opacity:loading||!niche.trim()?0.5:1,whiteSpace:'nowrap'}}>

            <div key={i} style={{background:T.cardSm,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7,flexWrap:'wrap',gap:7}}>
                <div style={{fontWeight:700,fontSize:14,color:T.textStrong}}>{idea.nome}</div>

    </div>

}

    flash();
  }

    localStorage.setItem('founder-profile',JSON.stringify(founder));
    flash();
  }

    localStorage.setItem('user-prefs',JSON.stringify(prefs));
    flash();
  }

  function saveIntegrations(){
    if(apiKey) localStorage.setItem('openai-key',apiKey);
    if(anthropicKey) localStorage.setItem('anthropic-key',anthropicKey);
    flash();
  }

  function exportData(){
    const data={ideas:localStorage.getItem('ideas_v2'),backlog:localStorage.getItem('backlog-v2'),members:localStorage.getItem('members-v2'),credentials:localStorage.getItem('credentials-v2'),gdrive:localStorage.getItem('gdrive-created-v2'),links:localStorage.getItem('gdrive-links-v2'),guia:localStorage.getItem('guia-done-v2'),founderProfile:localStorage.getItem('founder-profile'),appName:localStorage.getItem('app-name'),appIcon:localStorage.getItem('app-icon'),theme:localStorage.getItem('theme'),exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`venture_os_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
    URL.revokeObjectURL(url);
    setExportMsg('✓ Backup exportado com sucesso!');
    setTimeout(()=>setExportMsg(''),3000);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.ideas)localStorage.setItem('ideas_v2',d.ideas);
        if(d.backlog)localStorage.setItem('backlog-v2',d.backlog);
        if(d.members)localStorage.setItem('members-v2',d.members);
        if(d.appName)localStorage.setItem('app-name',d.appName);
        if(d.appIcon)localStorage.setItem('app-icon',d.appIcon);
        if(d.theme)localStorage.setItem('theme',d.theme);
        setExportMsg('✓ Dados importados! Recarregue a página.');

      }catch(err){setExportMsg('✗ Arquivo inválido.');}

    {label:'Tech',icons:['⚙️','🤖','💻','📱','🛸','🧠','🔬','📡','🛡️','⚗️']},
    {label:'Símbolos',icons:['🎪','🦅','🦁','🏄','🎨','🧭','🗺️','🎩','🌀','♾️']},
  ];

  const TABS=[
    {id:'identidade',icon:'🏷️',label:'Identidade'},
    {id:'perfil',icon:'👤',label:'Perfil'},
    {id:'aparencia',icon:'🎨',label:'Aparência'},
    {id:'integracoes',icon:'🔌',label:'Integrações'},
    {id:'preferencias',icon:'⚙️',label:'Preferências'},
    {id:'dados',icon:'💾',label:'Dados'},
    {id:'sobre',icon:'ℹ️',label:'Sobre'},
  ];

  const storageUsed=Object.keys(localStorage).filter(k=>['ideas_v2','backlog-v2','members-v2','credentials-v2'].includes(k)).reduce((a,k)=>{const v=localStorage.getItem(k);return a+(v?v.length:0);},0);
  const storageKB=(storageUsed/1024).toFixed(1);

  return(
    <div>

];

function buildTree(items){const map={};items.forEach(i=>{map[i.id]={...i,children:[]};});const roots=[];items.forEach(i=>{if(i.parentId&&map[i.parentId])map[i.parentId].children.push(map[i.id]);else if(!i.parentId)roots.push(map[i.id]);});return roots;}

function FolderNode({node,depth,T,created,toggle,links,setLinks,editing,setEditing}){
  const [open,setOpen]=useState(depth<1);
  const [editUrl,setEditUrl]=useState('');
  const isFolder=node.type==='folder'||node.type==='root';
  const isDone=created[node.id];
  const savedLink=links[node.id]||'';
  const isEditing=editing===node.id;
  const hasChildren=node.children&&node.children.length>0;

  function saveLink(){const n={...links,[node.id]:editUrl};setLinks(n);localStorage.setItem('gdrive-links-v2',JSON.stringify(n));setEditing(null);}

  return(
    <div>
      <div style={{marginLeft:depth*20,display:'flex',gap:7,alignItems:'center',padding:'7px 11px',background:isDone?`${node.color}12`:'transparent',border:`1px solid ${isDone?node.color+'35':T.border}`,borderRadius:9,marginBottom:4,transition:'all .15s'}}>
        {isFolder&&hasChildren?(
          <button onClick={()=>setOpen(!open)} style={{width:18,height:18,borderRadius:4,background:'none',border:'none',cursor:'pointer',color:T.muted,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{open?'▾':'▸'}</button>
        ):<div style={{width:18,flexShrink:0}}/>}
        <span style={{fontSize:15,flexShrink:0}}>{node.type==='root'?'🚀':node.type==='folder'?'📁':'📄'}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:isFolder?700:400,color:isDone?node.color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.name}</div>
          {node.desc&&<div style={{fontSize:11,color:T.hint}}>{node.desc}</div>}
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center',flexShrink:0}}>
          {savedLink?(<a href={savedLink} target="_blank" rel="noreferrer" style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:node.color+'22',color:node.color,border:`1px solid ${node.color}44`,fontWeight:600,textDecoration:'none'}}>📂 Abrir</a>):(<span style={{fontSize:11,color:T.hint,fontStyle:'italic'}}>sem link</span>)}
          <button onClick={()=>{setEditUrl(savedLink);setEditing(node.id);}} title="Colar link do Drive" style={{background:'none',border:`1px solid ${T.border}`,borderRadius:6,padding:'2px 6px',cursor:'pointer',fontSize:11,color:T.muted}}>🔗</button>
          {isFolder&&(<div onClick={()=>toggle(node.id)} style={{width:18,height:18,borderRadius:4,background:isDone?node.color:T.inputBg,border:isDone?'none':`2px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            {isDone&&<span style={{color:'white',fontSize:10}}>✓</span>}
          </div>)}
        </div>
      </div>
      {isEditing&&(
        <div style={{marginLeft:depth*20+36,marginBottom:6,display:'flex',gap:6}}>
          <input value={editUrl} onChange={e=>setEditUrl(e.target.value)} placeholder="Cole o link do Google Drive..." style={{flex:1,background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:7,padding:'6px 10px',color:T.text,fontSize:12,outline:'none'}}/>
          <button onClick={saveLink} style={{background:'#16a34a',color:'white',border:'none',borderRadius:7,padding:'6px 12px',fontSize:12,cursor:'pointer',fontWeight:600}}>Salvar</button>
          <button onClick={()=>setEditing(null)} style={{background:T.inputBg,color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:'6px 8px',fontSize:12,cursor:'pointer'}}>✕</button>
        </div>
      )}
      {isFolder&&open&&hasChildren&&(
        <div>{node.children.map(child=><FolderNode key={child.id} node={child} depth={depth+1} T={T} created={created} toggle={toggle} links={links} setLinks={setLinks} editing={editing} setEditing={setEditing}/>)}</div>
      )}
    </div>
  );
}

function GDrivePage({T}){
  const [created,setCreated]=useState(()=>JSON.parse(localStorage.getItem('gdrive-created-v2')||'{}'));
  const [links,setLinks]=useState(()=>JSON.parse(localStorage.getItem('gdrive-links-v2')||'{}'));
  const [editing,setEditing]=useState(null);
  const [showGuide,setShowGuide]=useState(false);
  const tree=buildTree(FOLDER_TREE);
  const totalFolders=FOLDER_TREE.filter(f=>f.type==='folder'||f.type==='root').length;
  const doneFolders=FOLDER_TREE.filter(f=>(f.type==='folder'||f.type==='root')&&created[f.id]).length;
  const pct=Math.round((doneFolders/totalFolders)*100);

  function toggle(id){const n={...created,[id]:!created[id]};setCreated(n);localStorage.setItem('gdrive-created-v2',JSON.stringify(n));}

    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:16}}>

      </div>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:'12px 16px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
          <span style={{fontSize:13,color:T.text,fontWeight:600}}>Pastas criadas</span>
          <span style={{fontSize:13,fontWeight:700,color:T.accent}}>{doneFolders}/{totalFolders}</span>
        </div>
        <div style={{background:T.progressBar,borderRadius:99,height:6,overflow:'hidden'}}><div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#7c3aed,#16a34a)',borderRadius:99,transition:'width .4s'}}/></div>
      </div>
      <div style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:10,padding:'10px 14px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:12,color:'#93c5fd',fontWeight:600}}>📖 Criar pasta → colar link 🔗 → marcar ✓</div>
          <button onClick={()=>setShowGuide(!showGuide)} style={{background:'rgba(37,99,235,0.15)',color:'#93c5fd',border:'1px solid rgba(37,99,235,0.3)',borderRadius:7,padding:'3px 10px',fontSize:11,cursor:'pointer'}}>{showGuide?'Fechar':'Ver como'}</button>
        </div>
        {showGuide&&(
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:7}}>
            {['Acesse drive.google.com e faça login.','Clique em "+ Novo" → "Pasta" → crie "🚀 Venture OS".','Dentro dela, crie as subpastas 00_, 01_, 02_...','Após criar cada pasta, clique com botão direito → "Copiar link".','Volte aqui, clique em 🔗 ao lado da pasta e cole o link.','Agora o botão "📂 Abrir" abre a pasta direto. Marque ✓.'].map((s,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:'rgba(37,99,235,0.25)',color:'#93c5fd',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:12,color:T.muted,lineHeight:1.65}}>{s}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div>{tree.map(node=><FolderNode key={node.id} node={node} depth={0} T={T} created={created} toggle={toggle} links={links} setLinks={setLinks} editing={editing} setEditing={setEditing}/>)}</div>
      {pct===100&&<div style={{marginTop:14,background:'rgba(22,163,74,0.1)',border:'1px solid rgba(22,163,74,0.3)',borderRadius:12,padding:'16px',textAlign:'center'}}><div style={{fontSize:22,marginBottom:6}}>🎉</div><div style={{fontSize:15,fontWeight:700,color:'#4ade80'}}>Estrutura completa!</div></div>}
    </div>
  );
}

              <div key={i} onClick={()=>toggle(step.title+i)} style={{display:'flex',gap:9,alignItems:'flex-start',padding:'7px 9px',borderRadius:8,cursor:'pointer',marginBottom:4,background:done[step.title+i]?'rgba(255,255,255,0.03)':'transparent'}}>
                <div style={{width:18,height:18,borderRadius:5,background:done[step.title+i]?'#16a34a':T.inputBg,border:done[step.title+i]?'none':`2px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                  {done[step.title+i]&&<span style={{color:'white',fontSize:10}}>✓</span>}
                </div>
                <span style={{fontSize:13,color:done[step.title+i]?'rgba(255,255,255,0.35)':T.text,textDecoration:done[step.title+i]?'line-through':'none',lineHeight:1.6}}>{item}</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}
</script>

<script type="text/babel">
/* ── APP + LOGIN + RENDER ─── */
const ADMIN = 'vergiliotoledo@hotmail.com';
function Login({onLogin,appName,appIcon}){
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');const [err,setErr]=useState('');const [c,setC]=useState(false);
  function go(){
    const s=JSON.parse(localStorage.getItem('auth-users')||'{}');
    if(!email.trim()){setErr('Digite e-mail.');return;}if(!pass.trim()){setErr('Digite senha.');return;}
    if(c){if(pass.length<6){setErr('Mín. 6 caracteres.');return;}
      s[email.toLowerCase()]={pass,name:email.split('@')[0],role:email.toLowerCase()===ADMIN.toLowerCase()?'admin':'viewer'};
      localStorage.setItem('auth-users',JSON.stringify(s));
      onLogin({email:email.toLowerCase(),role:s[email.toLowerCase()].role,name:s[email.toLowerCase()].name});
    }else{
      if(!s[email.toLowerCase()]){setErr('E-mail não encontrado.');return;}
      if(s[email.toLowerCase()].pass!==pass){setErr('Senha incorreta.');return;}
      onLogin({email:email.toLowerCase(),role:s[email.toLowerCase()].role,name:s[email.toLowerCase()].name});
    }
  }
  return (
    <div style={{minHeight:'100vh',background:'#070710',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:10}}>{appIcon}</div>
          <div style={{fontSize:22,fontWeight:700,color:'#f1f5f9',marginBottom:5}}>{appName}</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.4)'}}>Sistema de Gestão Estratégica</div>
        </div>
        <div style={{background:'#0f0f1e',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:'24px 20px'}}>
          <div style={{fontSize:15,fontWeight:700,color:'#f1f5f9',marginBottom:16}}>{c?'Criar acesso':'Entrar'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
            <input value={email} onChange={e=>{setEmail(e.target.value);setErr('');}} placeholder="seu@email.com" type="email" style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:8,padding:'10px 13px',color:'#f1f5f9',fontSize:14,outline:'none'}}/>
            <input value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} placeholder={c?'Crie uma senha (mín. 6)':'Sua senha'} type="password" onKeyDown={e=>e.key==='Enter'&&go()} style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:8,padding:'10px 13px',color:'#f1f5f9',fontSize:14,outline:'none'}}/>
            {err&&<div style={{fontSize:12,color:'#f87171',background:'rgba(220,38,38,0.1)',borderRadius:7,padding:'7px 11px'}}>{err}</div>}
          </div>
          <button onClick={go} style={{width:'100%',background:'#7c3aed',color:'white',border:'none',borderRadius:9,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:9}}>{c?'Criar e entrar':'Entrar'}</button>
          <button onClick={()=>{setC(!c);setErr('');}} style={{width:'100%',background:'rgba(255,255,255,0.04)',color:'rgba(255,255,255,0.5)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'9px',fontSize:12,cursor:'pointer'}}>{c?'Já tenho conta':'Primeiro acesso'}</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('current-user')||'null');}catch(e){return null;}});
  const [themeKey,setThemeKey]=useState(()=>localStorage.getItem('theme')||'menta');
  const [page,setPage]=useState('ideias');
  const [sbOpen,setSbOpen]=useState(true);
  const [appName,setAppName]=useState(()=>localStorage.getItem('app-name')||'Venture OS');
  const [appIcon,setAppIcon]=useState(()=>localStorage.getItem('app-icon')||'🚀');
  const [saved,setSaved]=useState(false);
  const T=THEMES[themeKey]||THEMES.menta;

  function login(u){setUser(u);localStorage.setItem('current-user',JSON.stringify(u));}
  function logout(){setUser(null);localStorage.removeItem('current-user');}
  function cycle(){const ks=Object.keys(THEMES);const n=ks[(ks.indexOf(themeKey)+1)%ks.length];setThemeKey(n);localStorage.setItem('theme',n);}
  function nav(id){setPage(id);closeSidebar();}
  function saveConfig(n,i){setAppName(n);setAppIcon(i);localStorage.setItem('app-name',n);localStorage.setItem('app-icon',i);setSaved(true);setTimeout(()=>setSaved(false),2000);}

  if(!user) return <Login onLogin={login} appName={appName} appIcon={appIcon}/>;

  const SW=sbOpen?215:54;

  return (
    <div id="main-layout" style={{display:'flex',height:'100vh',background:T.bg,color:T.text,overflow:'hidden'}}>

      {/* SIDEBAR */}
      <div id="sidebar" style={{width:SW,flexShrink:0,background:T.sidebar,borderRight:`1px solid ${T.border}`,display:'flex',flexDirection:'column',height:'100vh',transition:'width .2s',overflow:'hidden'}}>
        <div style={{padding:sbOpen?'16px 14px 13px':'16px 9px 13px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
          <span style={{fontSize:20,flexShrink:0}}>{appIcon}</span>
          {sbOpen&&<span style={{fontSize:12,fontWeight:700,color:T.accent,lineHeight:1.25,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{appName}</span>}
        </div>
        <div style={{flex:1,padding:'8px 5px',display:'flex',flexDirection:'column',gap:1,overflowY:'auto'}}>
          {NAV.map(item=>{
            const active=page===item.id;
            return (
              <button key={item.id} onClick={()=>nav(item.id)} title={item.label}
                style={{display:'flex',alignItems:'center',gap:9,padding:sbOpen?'8px 11px':'8px',borderRadius:8,border:'none',background:active?T.accentBg:'transparent',color:active?T.accent:T.stepNavText,cursor:'pointer',textAlign:'left',width:'100%',fontSize:12,fontWeight:active?700:400,transition:'all .15s',flexShrink:0}}>
                <span style={{fontSize:16,flexShrink:0}}>{item.emoji}</span>
                {sbOpen&&<span style={{lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</span>}
              </button>
            );
          })}
        </div>
        <div style={{padding:'7px 5px',borderTop:`1px solid ${T.border}`,flexShrink:0}}>
          {sbOpen&&(
            <div style={{padding:'7px 9px',marginBottom:5,background:T.inputBg,borderRadius:7}}>
              <div style={{fontSize:11,fontWeight:700,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name||user.email.split('@')[0]}</div>
              <div style={{fontSize:9,color:T.hint}}>{user.role==='admin'?'Administrador':'Membro'}</div>
            </div>
          )}
          <button onClick={cycle} title={`Tema: ${T.name}`} style={{display:'flex',alignItems:'center',gap:7,padding:sbOpen?'6px 9px':'6px',borderRadius:6,border:'none',background:'transparent',color:T.hint,cursor:'pointer',width:'100%',fontSize:11}}>
            <span style={{fontSize:14}}>{T.icon}</span>{sbOpen&&T.name}
          </button>
          <button onClick={logout} title="Sair" style={{display:'flex',alignItems:'center',gap:7,padding:sbOpen?'6px 9px':'6px',borderRadius:6,border:'none',background:'transparent',color:T.hint,cursor:'pointer',width:'100%',fontSize:11}}>
            <span style={{fontSize:14}}>🚪</span>{sbOpen&&'Sair'}
          </button>
          <button onClick={()=>setSbOpen(!sbOpen)} title="Recolher" style={{display:'flex',alignItems:'center',gap:7,padding:sbOpen?'6px 9px':'6px',borderRadius:6,border:'none',background:'transparent',color:T.hint,cursor:'pointer',width:'100%',fontSize:11}}>
            <span style={{fontSize:13}}>{sbOpen?'◀':'▶'}</span>{sbOpen&&'Recolher'}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <div id="topbar" style={{background:T.topbar,borderBottom:`1px solid ${T.border}`,padding:'13px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexShrink:0,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:10,letterSpacing:'.18em',color:T.topbarLabel,textTransform:'uppercase',marginBottom:2}}>
              {NAV.find(n=>n.id===page)?.emoji} {NAV.find(n=>n.id===page)?.label}
            </div>
            <div style={{fontSize:17,fontWeight:700,color:T.textStrong}}>{appIcon} {appName}</div>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center'}}>
            {saved&&<span style={{fontSize:11,color:'#4ade80',background:'rgba(22,163,74,0.15)',padding:'3px 9px',borderRadius:20}}>✓ Salvo</span>}
            <div style={{display:'flex',gap:3}}>
              {Object.entries(THEMES).map(([k,th])=>(
                <button key={k} onClick={()=>{setThemeKey(k);localStorage.setItem('theme',k);}} title={th.name}
                  style={{width:20,height:20,borderRadius:'50%',background:th.btnPrimary,border:themeKey===k?'2px solid white':'2px solid transparent',cursor:'pointer',transition:'all .15s'}}/>
              ))}
            </div>
          </div>
        </div>

        <div id="page-content" style={{flex:1,overflowY:'auto',padding:'22px',background:T.content}}>
          <div style={{maxWidth:940,margin:'0 auto'}}>
            {page==='ideias'    &&<IdeasPage T={T}/>}
            {page==='guia'      &&<GuiaPage T={T}/>}
            {page==='backlog'   &&<BacklogPage T={T}/>}
            {page==='membros'   &&<MembersPage T={T} currentUser={user}/>}
            {page==='senhas'    &&<PasswordsPage T={T}/>}
            {page==='gdrive'    &&<GDrivePage T={T}/>}
            {page==='config'    &&<ConfigPage T={T} appName={appName} appIcon={appIcon} onSave={saveConfig} themeKey={themeKey} setThemeKeyExternal={(k)=>{setThemeKey(k);localStorage.setItem('theme',k);}}/>}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
